<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>People at Crawl — HR Management Platform</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#f4f6fb; --panel:#ffffff; --ink:#1f2937; --muted:#6b7280; --line:#e5e7eb;
  --brand:#4f46e5; --brand-dark:#4338ca; --brand-soft:#eef2ff;
  --green:#16a34a; --green-soft:#dcfce7; --amber:#d97706; --amber-soft:#fef3c7;
  --red:#dc2626; --red-soft:#fee2e2; --blue:#2563eb; --blue-soft:#dbeafe;
  --purple:#7c3aed; --purple-soft:#ede9fe; --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px}
a{color:var(--brand);text-decoration:none}
.hidden{display:none!important}

/* ===== LOGIN ===== */
#login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#4f46e5,#7c3aed)}
.login-card{background:#fff;border-radius:16px;padding:40px;width:380px;box-shadow:0 20px 50px rgba(0,0,0,.3)}
.login-card h1{font-size:26px;margin-bottom:4px;color:var(--brand)}
.login-card p.sub{color:var(--muted);margin-bottom:24px}
.login-card label{display:block;font-weight:600;margin:14px 0 6px;font-size:13px}
.login-card select,.login-card input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:9px;background:#fff}
.login-card button{width:100%;margin-top:22px;padding:12px;background:var(--brand);color:#fff;border:none;border-radius:9px;font-weight:600;font-size:15px}
.login-card button:hover{background:var(--brand-dark)}
.role-hint{font-size:12px;color:var(--muted);margin-top:8px;min-height:16px}

/* ===== LAYOUT ===== */
#app{display:flex;min-height:100vh}
#sidebar{width:236px;background:#1e293b;color:#cbd5e1;flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.brand{padding:20px 20px 16px;font-size:19px;font-weight:700;color:#fff;display:flex;align-items:center;gap:9px;border-bottom:1px solid #334155}
.brand .logo{width:30px;height:30px;background:linear-gradient(135deg,#6366f1,#a855f7);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.nav{padding:10px 0;flex:1}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 20px;color:#cbd5e1;cursor:pointer;font-size:13.5px;border-left:3px solid transparent}
.nav-item:hover{background:#273449;color:#fff}
.nav-item.active{background:#273449;color:#fff;border-left-color:var(--brand)}
.nav-item .ic{width:18px;text-align:center;font-size:15px}
.nav-section{padding:14px 20px 5px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#64748b;font-weight:700}
#main{flex:1;display:flex;flex-direction:column;min-width:0}
#topbar{height:60px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 26px;position:sticky;top:0;z-index:20}
#topbar .page-title{font-size:18px;font-weight:700}
.topbar-right{display:flex;align-items:center;gap:18px}
.bell{position:relative;font-size:20px;cursor:pointer}
.bell .badge{position:absolute;top:-5px;right:-6px;background:var(--red);color:#fff;border-radius:10px;font-size:10px;padding:1px 5px;font-weight:700}
.user-chip{display:flex;align-items:center;gap:9px;cursor:pointer}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
.user-chip .meta{line-height:1.2}
.user-chip .meta .n{font-weight:600;font-size:13px}
.user-chip .meta .r{font-size:11px;color:var(--muted)}
#content{padding:24px 26px;flex:1}

/* ===== COMPONENTS ===== */
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow)}
.card-pad{padding:18px}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.section-head h2{font-size:17px}
.section-head .desc{color:var(--muted);font-size:13px;margin-top:2px}
.btn{padding:8px 14px;border-radius:8px;border:1px solid var(--line);background:#fff;font-weight:600;font-size:13px;color:var(--ink);display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:#f9fafb}
.btn-primary{background:var(--brand);border-color:var(--brand);color:#fff}
.btn-primary:hover{background:var(--brand-dark)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-danger{color:var(--red);border-color:#fecaca}
.btn-danger:hover{background:var(--red-soft)}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.toolbar input[type=text],.toolbar select{padding:8px 11px;border:1px solid var(--line);border-radius:8px;background:#fff}
.toolbar input[type=text]{min-width:220px}
.spacer{flex:1}

table{width:100%;border-collapse:collapse;font-size:13px}
thead th{text-align:left;padding:11px 14px;background:#f9fafb;color:var(--muted);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid var(--line);white-space:nowrap}
tbody td{padding:11px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
tbody tr:hover{background:#fafbff}
tbody tr:last-child td{border-bottom:none}
.table-wrap{overflow-x:auto}

.badge-pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:600}
.b-green{background:var(--green-soft);color:var(--green)}
.b-amber{background:var(--amber-soft);color:var(--amber)}
.b-red{background:var(--red-soft);color:var(--red)}
.b-blue{background:var(--blue-soft);color:var(--blue)}
.b-purple{background:var(--purple-soft);color:var(--purple)}
.b-gray{background:#f1f5f9;color:#64748b}

.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:22px}
.kpi{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px 18px;box-shadow:var(--shadow)}
.kpi .label{color:var(--muted);font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:7px}
.kpi .val{font-size:28px;font-weight:700;margin-top:7px}
.kpi .sub{font-size:12px;color:var(--muted);margin-top:3px}
.kpi .ic{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
@media(max-width:900px){.grid-2,.grid-3{grid-template-columns:1fr}}

.avatar-sm{width:30px;height:30px;border-radius:50%;background:var(--brand-soft);color:var(--brand);display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;flex-shrink:0}
.emp-cell{display:flex;align-items:center;gap:10px}
.emp-cell .nm{font-weight:600}
.emp-cell .sub{font-size:11.5px;color:var(--muted)}

/* progress */
.progress{height:8px;background:#eef2f7;border-radius:6px;overflow:hidden;min-width:80px}
.progress>span{display:block;height:100%;background:var(--brand);border-radius:6px}

/* MODAL */
#modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;z-index:100;overflow-y:auto}
.modal{background:#fff;border-radius:14px;width:560px;max-width:100%;box-shadow:0 25px 60px rgba(0,0,0,.3);animation:pop .15s ease}
@keyframes pop{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.modal-head h3{font-size:17px}
.modal-head .x{font-size:22px;color:var(--muted);cursor:pointer;line-height:1}
.modal-body{padding:22px;max-height:65vh;overflow-y:auto}
.modal-foot{padding:14px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}
.form-row{margin-bottom:14px}
.form-row.two{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-row label{display:block;font-weight:600;font-size:12.5px;margin-bottom:5px}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;background:#fff}
.form-row textarea{min-height:72px;resize:vertical}

/* toast */
#toast{position:fixed;bottom:24px;right:24px;z-index:200;display:flex;flex-direction:column;gap:10px}
.toast-item{background:#1e293b;color:#fff;padding:12px 18px;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.25);font-size:13.5px;display:flex;align-items:center;gap:10px;animation:pop .15s ease}
.toast-item.ok{background:#15803d}.toast-item.err{background:#b91c1c}

/* tabs */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:18px;flex-wrap:wrap}
.tab{padding:9px 16px;font-weight:600;font-size:13px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:var(--brand);border-bottom-color:var(--brand)}

/* kanban */
.kanban{display:flex;gap:14px;overflow-x:auto;padding-bottom:10px}
.kcol{background:#f1f5f9;border-radius:11px;min-width:230px;width:230px;flex-shrink:0;display:flex;flex-direction:column}
.kcol-head{padding:11px 13px;font-weight:700;font-size:12.5px;display:flex;justify-content:space-between;align-items:center;text-transform:uppercase;letter-spacing:.3px}
.kcol-body{padding:0 9px 9px;display:flex;flex-direction:column;gap:8px;min-height:60px}
.kcard{background:#fff;border:1px solid var(--line);border-radius:9px;padding:11px;box-shadow:var(--shadow);cursor:grab}
.kcard:active{cursor:grabbing}
.kcard.dragover{outline:2px dashed var(--brand)}
.kcard .nm{font-weight:600;font-size:13px}
.kcard .meta{font-size:11.5px;color:var(--muted);margin-top:3px}
.kcol.dragover{outline:2px dashed var(--brand);outline-offset:-3px}

/* calendar */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal .dow{font-size:11px;font-weight:700;color:var(--muted);text-align:center;text-transform:uppercase;padding-bottom:4px}
.cal .day{aspect-ratio:1;border:1px solid var(--line);border-radius:8px;padding:6px;font-size:12px;position:relative;background:#fff}
.cal .day .num{font-weight:600}
.cal .day.empty{background:transparent;border:none}
.cal .dot{position:absolute;bottom:6px;left:6px;right:6px;font-size:9.5px;padding:1px 4px;border-radius:5px;text-align:center;font-weight:600}

.empty-state{text-align:center;padding:46px 20px;color:var(--muted)}
.empty-state .ico{font-size:38px;margin-bottom:10px;opacity:.6}
.list-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}
.list-row:last-child{border-bottom:none}
.dot-ic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
canvas{max-width:100%}
.muted{color:var(--muted)}
.mini-stat{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px dashed var(--line);font-size:13px}
.mini-stat:last-child{border-bottom:none}
.mini-stat b{font-weight:700}
.access-deny{text-align:center;padding:70px 20px;color:var(--muted)}
.access-deny .ico{font-size:46px;margin-bottom:12px}
.star{color:#f59e0b}

/* ===== ORG CHART TREE ===== */
.org-wrap{overflow:auto;padding:26px 14px}
.orgt{display:flex;justify-content:center;min-width:max-content;list-style:none;margin:0;padding:0}
.orgt ul{display:flex;justify-content:center;padding-top:28px;position:relative;list-style:none;margin:0}
.orgt li{list-style:none;position:relative;padding:28px 14px 0;text-align:center}
.orgt li::before,.orgt li::after{content:'';position:absolute;top:0;height:28px;width:50%;border-top:2px solid #cbd5e1}
.orgt li::before{left:0;border-right:2px solid #cbd5e1}
.orgt li::after{right:0}
.orgt li:only-child::before,.orgt li:only-child::after{display:none}
.orgt li:only-child{padding-top:28px}
.orgt li:first-child::before,.orgt li:last-child::after{border:0 none}
.orgt li:last-child::before{border-right:2px solid #cbd5e1;border-radius:0 9px 0 0}
.orgt li:first-child::after{border-radius:9px 0 0 0}
.orgt ul::before{content:'';position:absolute;top:0;left:50%;height:28px;width:2px;background:#cbd5e1;transform:translateX(-1px)}
.orgt>li{padding-top:0}
.orgt>li::before,.orgt>li::after{display:none}
.orgt-card{display:inline-flex;flex-direction:column;align-items:center;gap:3px;background:#fff;border:1px solid var(--line);border-radius:13px;padding:14px 18px;min-width:158px;box-shadow:var(--shadow);cursor:pointer;transition:transform .12s,box-shadow .12s,border-color .12s;position:relative;border-top:3px solid var(--brand)}
.orgt-card:hover{transform:translateY(-3px);box-shadow:0 10px 24px rgba(0,0,0,.12)}
.orgt-av{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px;margin-bottom:4px;box-shadow:0 2px 6px rgba(0,0,0,.15)}
.orgt-name{font-weight:700;font-size:13.5px;color:var(--ink)}
.orgt-title{color:var(--muted);font-size:11.5px;max-width:150px}
.orgt-role{margin-top:4px;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--brand);background:var(--brand-soft);padding:2px 9px;border-radius:20px}
.orgt-count{position:absolute;top:-9px;right:-9px;font-size:10px;font-weight:700;color:#fff;background:var(--brand);min-width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:20px;padding:0 5px;box-shadow:0 1px 3px rgba(0,0,0,.2)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <h1>● People at Crawl</h1>
    <p class="sub">Crawl Digitally · HR Management Platform</p>
    <label>Work Email</label>
    <input id="login-email" type="email" placeholder="you@crawldigitally.com" autocomplete="username" onkeydown="if(event.key==='Enter')doLogin()">
    <label>Password</label>
    <input id="login-pass" type="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="role-hint" id="login-err"></div>
    <button onclick="doLogin()">Sign In →</button>
    <div style="margin-top:16px;border-top:1px solid var(--line);padding-top:12px">
      <div class="muted" style="font-size:11.5px;margin-bottom:6px">Quick demo login — pick a person (password auto-fills):</div>
      <select id="login-user" onchange="quickFill()" style="font-size:12.5px"></select>
    </div>
    <div style="text-align:center;margin-top:12px"><a href="javascript:void(0)" onclick="resetDemo()" style="font-size:12px;color:#9ca3af">↺ Reset demo data</a></div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <aside id="sidebar">
    <div class="brand"><span class="logo">●</span> People at Crawl</div>
    <nav class="nav" id="nav"></nav>
  </aside>
  <div id="main">
    <header id="topbar">
      <div class="page-title" id="page-title">Dashboard</div>
      <div class="topbar-right">
        <div class="bell" onclick="openNotifications()">🔔<span class="badge" id="notif-badge">0</span></div>
        <div class="user-chip" onclick="logout()" title="Click to sign out">
          <div class="avatar" id="topbar-avatar">--</div>
          <div class="meta"><div class="n" id="topbar-name">--</div><div class="r" id="topbar-role">--</div></div>
        </div>
      </div>
    </header>
    <main id="content"></main>
  </div>
</div>

<div id="toast"></div>

<script>
/* =========================================================================
   PeopleHub — single-file HR platform.  Data persists in localStorage.
   ========================================================================= */
const DB_KEY = 'peoplehub_v1';
const DEFAULT_PAYROLL_POLICY={statutoryEnabled:false,epfRate:12,epfCap:15000,esiRate:0.75,esiErRate:3.25,esiThreshold:21000,ptAmount:200,lwfAmount:20,
  shiftStart:'09:00',lateThresholdMin:15,lateGraceMarks:2,latePerMark:50,lateRule:'amount',latesPerLopDay:3,
  paidLeavesPerMonth:1,halfDayAllowance:1,unplannedLop:true,unplannedPenaltyMultiplier:2,sandwichLeave:true,customRules:[]};
/* Safe storage: use localStorage when available, else fall back to in-memory
   (keeps the app working even when opened directly from disk in strict browsers). */
const STORE = (() => {
  try { const k='__t'; localStorage.setItem(k,'1'); localStorage.removeItem(k); return localStorage; }
  catch(e){ const mem={}; return {getItem:k=>k in mem?mem[k]:null, setItem:(k,v)=>{mem[k]=''+v;}, removeItem:k=>{delete mem[k];}}; }
})();
let DB = {};
let SESSION = null;   // current user {empId, role, name}
let CURRENT_VIEW = 'dashboard';

/* ---------- utilities ---------- */
const $ = s => document.querySelector(s);
const uid = p => p + '_' + Math.random().toString(36).slice(2,9);
const today = () => new Date().toISOString().slice(0,10);
const fmtDate = d => d ? new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—';
const fmtMoney = n => '₹'+Number(Math.round(n||0)).toLocaleString('en-IN');
const initials = n => n.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
const daysBetween = (a,b)=>Math.round((new Date(b)-new Date(a))/864e5)+1;
function save(){ STORE.setItem(DB_KEY, JSON.stringify(DB)); }
function toast(msg,type=''){ const t=document.createElement('div'); t.className='toast-item '+type; t.innerHTML=(type==='ok'?'✓ ':type==='err'?'⚠ ':'')+msg; $('#toast').appendChild(t); setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300)},2600); }
function esc(s){ return (''+(s??'')).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function badge(text,cls){ return `<span class="badge-pill ${cls}">${esc(text)}</span>`; }
function empName(id){ const e=DB.employees.find(x=>x.id===id); return e?e.name:'—'; }
function empAvatar(id,size='avatar-sm'){ const e=DB.employees.find(x=>x.id===id); const n=e?e.name:'?'; return `<span class="${size}">${initials(n)}</span>`; }
function deptName(id){ const d=DB.departments.find(x=>x.id===id); return d?d.name:'—'; }

/* status -> badge class maps */
const STATUS_CLS = {
  'Active':'b-green','On Leave':'b-amber','Terminated':'b-red','Probation':'b-blue',
  'Pending':'b-amber','In Progress':'b-blue','Completed':'b-green','Approved':'b-green','Rejected':'b-red',
  'Open':'b-green','Closed':'b-gray','Draft':'b-gray','On Hold':'b-amber',
  'Sent':'b-blue','Accepted':'b-green','Declined':'b-red','Expired':'b-gray','Hired':'b-green',
  'Processed':'b-green','Not Started':'b-gray','At Risk':'b-red','Submitted':'b-blue','Acknowledged':'b-green',
  'Present':'b-green','Absent':'b-red','Half Day':'b-amber'
};
const sbadge = s => badge(s, STATUS_CLS[s]||'b-gray');

/* =========================================================================
   SEED DATA
   ========================================================================= */
function seed(){
  const depts = [
    {id:'d1',name:'Performance Marketing'},{id:'d2',name:'Sales'},{id:'d3',name:'Social Media'},
    {id:'d4',name:'HR & Operations'},{id:'d5',name:'UGC'},{id:'d6',name:'Design & Video'}
  ];
  const emp = (id,name,title,dept,mgr,role,type,start,email,status,dob,phone,loc,kpiRole)=>{
    const n=parseInt(id.replace(/\D/g,''),10)||0;
    return {id,name,title,dept,manager:mgr,role,empType:type,startDate:start,email,
     status,dob,phone,location:loc,kpiRole:kpiRole||null,gender:n%2?'Female':'Male',
     password:'crawl123',accountActive:true,
     address:(100+n)+' Linking Road, Mumbai, MH',
     emergency:'Family Contact · +91 90000 '+String(100+n).padStart(4,'0'),personalEmail:name.split(' ')[0].toLowerCase()+'@gmail.com'};};
  const employees = [
    emp('e1','Akshay Shukla','Founder & CEO','d4',null,'Super Admin','Full-time','2019-03-04','akshay@crawldigitally.com','Active','1990-06-12','+91 90000 00101','Mumbai',null),
    emp('e2','Rahul Mehta','Performance Marketing Lead','d1','e1','Manager','Full-time','2019-08-15','rahul@crawldigitally.com','Active','1989-11-03','+91 90000 00102','Mumbai','Performance Marketer'),
    emp('e3','Priya Sharma','HR Manager','d4','e1','HR Manager','Full-time','2020-01-20','priya@crawldigitally.com','Active','1992-02-18','+91 90000 00103','Mumbai',null),

  function statutoryFor(basic,gross){
    const epf=Math.round(0.12*Math.min(basic,15000));         // EPF 12% on basic, capped at ₹15k wage
    const esi=gross<=21000?Math.round(0.0075*gross):0;        // ESI 0.75% if gross ≤ ₹21k
    const pt=gross>=25000?200:gross>=15000?150:0;             // Professional Tax (state slab)
    const lwf=20;                                             // Labour Welfare Fund
    const annual=gross*12; let tds=0;                         // simple TDS estimate (new regime-ish)
    const taxable=annual-50000;
    if(taxable>1500000) tds=Math.round((150000+ (taxable-1500000)*0.30)/12);
    else if(taxable>1200000) tds=Math.round((90000+(taxable-1200000)*0.20)/12);
    else if(taxable>900000) tds=Math.round((45000+(taxable-900000)*0.15)/12);
    else if(taxable>700000) tds=Math.round((20000+(taxable-700000)*0.10)/12);
    else if(taxable>300000) tds=Math.round(((taxable-300000)*0.05)/12);
    return {epf,esi,pt,lwf,tds};
  }

const DB_COLLECTIONS=['departments','employees','leaveTypes','leaveBalances','leaveRequests','holidays','attendance','jobs','candidates','interviews','onboardTasks','offboardTasks','exitInterviews','salary','payrollRuns','reviewCycles','goals','reviews','feedback','courses','courseAssign','certifications','recognitions','surveys','enps','policies','auditLogs','notifications','kpiScorecards','payslips','reimbursements','salaryRevisions','documents','timesheets','investmentProofs','salesIncentives','assets'];
function loadDB(){
  const raw=STORE.getItem(DB_KEY);
  if(raw){ try{ DB=JSON.parse(raw); }catch(e){ seed(); return; } } else { seed(); return; }
  // Self-healing: backfill any collections added in newer versions so older saved data never breaks a module
  let changed=false;
  DB_COLLECTIONS.forEach(k=>{ if(!Array.isArray(DB[k])){ DB[k]=[]; changed=true; } });
  // Normalise legacy payroll records (pf/tax → epf/tds + statutory fields)
  DB.payslips.forEach(p=>{ if(p.epf===undefined&&p.pf!==undefined){ p.epf=p.pf; p.tds=p.tax||0; p.esi=p.esi||0; p.pt=p.pt||0; p.lwf=p.lwf||0; p.arrears=p.arrears||0; p.lopReversal=p.lopReversal||0; p.disbursement=p.disbursement||(p.status==='Paid'?'Paid':'Pending'); changed=true; } });
  DB.salary.forEach(s=>{ if(s.epf===undefined&&s.pf!==undefined){ s.epf=s.pf; s.tds=s.tax||0; s.esi=0; s.pt=0; s.lwf=0; changed=true; } });
  DB.employees.forEach(e=>{ if(e.password===undefined){ e.password='crawl123'; changed=true; } if(e.accountActive===undefined){ e.accountActive=true; changed=true; } });
  // Config objects (not plain arrays) — seed defaults if missing
  if(!DB.kpiTemplates||typeof DB.kpiTemplates!=='object'||!Object.keys(DB.kpiTemplates).length){ DB.kpiTemplates=JSON.parse(JSON.stringify(KPI_TEMPLATES_DEFAULT)); changed=true; }
  if(!Array.isArray(DB.docTypes)||!DB.docTypes.length){ DB.docTypes=[...DOC_TYPES_DEFAULT]; changed=true; }
  if(!DB.payrollPolicy||typeof DB.payrollPolicy!=='object'){ DB.payrollPolicy={...DEFAULT_PAYROLL_POLICY}; changed=true; }
  else { Object.keys(DEFAULT_PAYROLL_POLICY).forEach(k=>{ if(DB.payrollPolicy[k]===undefined){ DB.payrollPolicy[k]=DEFAULT_PAYROLL_POLICY[k]; changed=true; } }); }
  if(changed) save();
}
function resetDemo(){
  if(!confirm('Reset to fresh demo data? This clears any changes you made and reloads the sample Crawl Digitally data.')) return;
  STORE.removeItem(DB_KEY); seed(); location.reload();
}

function initLogin(){

function quickFill(){
  const e=DB.employees.find(x=>x.id===$('#login-user').value); if(!e) return;
  $('#login-email').value=e.email||''; $('#login-pass').value=e.password||'crawl123'; $('#login-err').textContent='';
}
function doLogin(){
  const email=($('#login-email').value||'').trim().toLowerCase();
  const pass=$('#login-pass').value||'';
  const err=$('#login-err');
  if(!email||!pass){ err.textContent='Enter your email and password.'; return; }
  const e=DB.employees.find(x=>(x.email||'').toLowerCase()===email);
  if(!e){ err.textContent='No account found for that email.'; return; }
  if(e.status==='Terminated'||e.accountActive===false){ err.textContent='This account is inactive. Contact HR.'; return; }
  if((e.password||'crawl123')!==pass){ err.textContent='Incorrect password. Try again.'; return; }
  err.textContent='';
  SESSION={empId:e.id,role:e.role,name:e.name,dept:e.dept};
  $('#login').classList.add('hidden');
  $('#app').classList.remove('hidden');
  $('#topbar-avatar').textContent=initials(e.name);
  $('#topbar-name').textContent=e.name;
  $('#topbar-role').textContent=e.role;
  buildNav(); updateNotifBadge();
  navigate('dashboard');
}
function logout(){
  if(!confirm('Sign out of PeopleHub?')) return;
  SESSION=null;
  $('#app').classList.add('hidden');
  $('#login').classList.remove('hidden');
  initLogin();
}
function buildNav(){
  $('#nav').innerHTML=NAV.map(item=>{
    if(item.section) return `<div class="nav-section">${item.section}</div>`;
    if(!canSee(item)) return '';
    return `<div class="nav-item${item.id===CURRENT_VIEW?' active':''}" data-id="${item.id}" onclick="navigate('${item.id}')">
      <span class="ic">${item.ic}</span> ${item.label}</div>`;
  }).join('');
}
function navigate(id){
  const item=NAV.find(n=>n.id===id);
  if(item && !canSee(item)){ id='dashboard'; }
  CURRENT_VIEW=id;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.id===id));
  const meta=NAV.find(n=>n.id===id);
  $('#page-title').textContent=meta?meta.label:'Dashboard';
  window.scrollTo(0,0);
  const fn=VIEWS[id];
  $('#content').innerHTML = fn ? fn() : '<div class="empty-state">Coming soon</div>';
  if(AFTER[id]) AFTER[id]();   // run charts/handlers after render
}

function openModal(title, bodyHTML, onSave, saveLabel='Save'){
  closeModal();
  const ov=document.createElement('div'); ov.id='modal-overlay';
  ov.innerHTML=`<div class="modal">
    <div class="modal-head"><h3>${esc(title)}</h3><span class="x" onclick="closeModal()">×</span></div>
    <div class="modal-body">${bodyHTML}</div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">Cancel</button>
      ${onSave?`<button class="btn btn-primary" id="modal-save">${esc(saveLabel)}</button>`:''}
    </div></div>`;
  ov.onclick=e=>{ if(e.target===ov) closeModal(); };
  document.body.appendChild(ov);
  if(onSave) $('#modal-save').onclick=()=>{ if(onSave()!==false) closeModal(); };
}
function closeModal(){ const m=$('#modal-overlay'); if(m) m.remove(); }
function field(label,id,value='',type='text',opts){
  if(type==='select'){
    return `<div class="form-row"><label>${label}</label><select id="${id}">${opts.map(o=>{
      const v=typeof o==='object'?o.v:o, t=typeof o==='object'?o.t:o;
      return `<option value="${esc(v)}"${v==value?' selected':''}>${esc(t)}</option>`;}).join('')}</select></div>`;
  }
  if(type==='textarea') return `<div class="form-row"><label>${label}</label><textarea id="${id}">${esc(value)}</textarea></div>`;
  return `<div class="form-row"><label>${label}</label><input type="${type}" id="${id}" value="${esc(value)}"></div>`;
}

    +`<div class="form-row two">${field('Manager','f-mgr',e.manager||'','select',[{v:'',t:'— None —'}].concat(DB.employees.map(x=>({v:x.id,t:x.name}))))}${field('Employment Type','f-type',e.empType||'Full-time','select',['Full-time','Part-time','Contract'])}</div>`

    +`<div class="form-row two">${field('Account Password','f-pass',e.password||'crawl123')}${field('Account Active','f-acct',(e.accountActive===false?'No':'Yes'),'select',['Yes','No'])}</div>`;

function wireRoleHelp(){ const sel=$('#f-role'); if(sel) sel.onchange=()=>{ const h=$('#role-help'); if(h) h.textContent=ACCESS_ROLE_DESC[sel.value]||''; }; }
function ensureSalary(empId,role,empType){
  if(DB.salary.find(s=>s.emp===empId)) return;
  const monthly=Math.round(({'Super Admin':200000,'HR Manager':80000,'Manager':90000,'Employee':35000}[role]||30000)*(empType==='Part-time'?0.5:1));
  const basic=Math.round(monthly*0.5),hra=Math.round(monthly*0.2),transport=1600,special=monthly-basic-hra-transport;
  const epf=Math.round(0.12*Math.min(basic,15000));
  DB.salary.push({emp:empId,basic,hra,transport,special,epf,esi:0,pt:basic+hra+transport+special>=25000?200:0,lwf:20,tds:0,annual:monthly*12});
}

    +`<div class="form-row two">${field('Max Carry Days','f-ltcm',t.carryMax??0,'number')}${field('Needs Document','f-ltd',t.doc?'Yes':'No','select',['No','Yes'])}</div>`;

function adjustBalances(empId){
  const e=DB.employees.find(x=>x.id===empId);
  const body=`<div class="emp-cell" style="margin-bottom:14px">${empAvatar(empId,'avatar')}<div><div class="nm" style="font-weight:700">${esc(e.name)}</div><div class="sub muted">Adjust leave balances</div></div></div>`
    +DB.leaveTypes.map(t=>{const b=DB.leaveBalances.find(x=>x.emp===empId&&x.type===t.id)||{allocated:t.maxDays,used:0};
      return `<div class="form-row two" style="margin-bottom:8px"><div style="grid-column:1/-1;font-weight:600;font-size:12.5px">${esc(t.name)}</div>${field('Allocated','f-al-'+t.id,b.allocated,'number')}${field('Used','f-us-'+t.id,b.used,'number')}</div>`;}).join('');
  openModal('Adjust Leave Balances',body,()=>{
    DB.leaveTypes.forEach(t=>{ let b=DB.leaveBalances.find(x=>x.emp===empId&&x.type===t.id);
      if(!b){ b={id:uid('lb'),emp:empId,type:t.id,allocated:t.maxDays,used:0,pending:0}; DB.leaveBalances.push(b); }
      b.allocated=Math.max(0,+val('f-al-'+t.id)||0); b.used=Math.max(0,+val('f-us-'+t.id)||0); });
    log('Adjusted leave balances',e.name); save(); refreshLeave(); toast('Balances updated','ok');
  });
}
function editLeaveReq(id){
  const r=DB.leaveRequests.find(x=>x.id===id);
  const body=field('Leave Type','f-elt',r.type,'select',DB.leaveTypes.map(t=>({v:t.id,t:t.name})))
    +`<div class="form-row two">${field('From','f-efrom',r.from,'date')}${field('To','f-eto',r.to,'date')}</div>`
    +field('Reason','f-ereason',r.reason||'','textarea')
    +field('Status','f-estatus',r.status,'select',['Pending','Approved','Rejected']);
  openModal('Edit Leave Request',body,()=>{
    const wasApproved=r.status==='Approved'; const newStatus=val('f-estatus');
    // revert old balance deduction if it was approved
    if(wasApproved){ const ob=DB.leaveBalances.find(x=>x.emp===r.emp&&x.type===r.type); if(ob) ob.used=Math.max(0,ob.used-daysBetween(r.from,r.to)); }
    r.type=val('f-elt'); r.from=val('f-efrom'); r.to=val('f-eto'); r.reason=val('f-ereason'); r.status=newStatus;
    if(newStatus==='Approved'){ const nb=DB.leaveBalances.find(x=>x.emp===r.emp&&x.type===r.type); if(nb) nb.used+=daysBetween(r.from,r.to); }
    log('Edited leave request',empName(r.emp)); save(); refreshLeave(); toast('Leave request updated','ok');
  });
}
function deleteLeaveReq(id){
  const r=DB.leaveRequests.find(x=>x.id===id); if(!confirm('Delete this leave request?'))return;
  if(r.status==='Approved'){ const b=DB.leaveBalances.find(x=>x.emp===r.emp&&x.type===r.type); if(b) b.used=Math.max(0,b.used-daysBetween(r.from,r.to)); }
  DB.leaveRequests=DB.leaveRequests.filter(x=>x.id!==id); log('Deleted leave request',empName(r.emp)); save(); refreshLeave(); toast('Deleted','ok');
}
function leaveCalendar(){
  const now=new Date(); const y=now.getFullYear(),m=now.getMonth();
  const first=new Date(y,m,1).getDay(); const days=new Date(y,m+1,0).getDate();
  let cells='';
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d=>cells+=`<div class="dow">${d}</div>`);
  for(let i=0;i<first;i++) cells+='<div class="day empty"></div>';
  for(let d=1;d<=days;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const onLeave=DB.leaveRequests.filter(r=>r.status==='Approved'&&ds>=r.from&&ds<=r.to);
    const hol=DB.holidays.find(h=>h.date===ds);
    const isToday=ds===today();
    let dot='';
    if(hol) dot=`<div class="dot" style="background:var(--purple-soft);color:var(--purple)">${esc(hol.name)}</div>`;
    if(onLeave.length) dot+=`<div class="dot" style="background:var(--amber-soft);color:var(--amber);${hol?'bottom:22px':''}">${onLeave.length} on leave</div>`;
    const clickable=onLeave.length||hol;
    cells+=`<div class="day" ${clickable?`onclick="showLeaveDay('${ds}')" style="cursor:pointer"`:''}${isToday?' '+(clickable?'':'style="')+'box-shadow:inset 0 0 0 2px var(--brand)'+(clickable?'':'"')+'"':''}><div class="num">${d}</div>${dot}</div>`;
  }
  return `<div class="card card-pad"><h3 style="margin-bottom:14px">${now.toLocaleDateString('en-US',{month:'long',year:'numeric'})}</h3><div class="cal">${cells}</div>
    <div style="margin-top:14px;display:flex;gap:16px;font-size:12px;align-items:center"><span class="badge-pill b-amber">On Leave</span><span class="badge-pill b-purple">Holiday</span><span class="muted">Click a highlighted day to see who's on leave</span></div></div>`;
}
function showLeaveDay(ds){
  const onLeave=DB.leaveRequests.filter(r=>r.status==='Approved'&&ds>=r.from&&ds<=r.to);
  const hol=DB.holidays.find(h=>h.date===ds);
  const body=`${hol?`<div class="card-pad" style="background:var(--purple-soft);border-radius:8px;margin-bottom:12px"><b>🎉 ${esc(hol.name)}</b> — Public Holiday</div>`:''}
    ${onLeave.length?onLeave.map(r=>{const e=DB.employees.find(x=>x.id===r.emp);
      return `<div class="list-row">${empAvatar(r.emp,'avatar')}<div style="flex:1"><div class="nm" style="font-weight:600">${empName(r.emp)}</div>
        <div class="muted" style="font-size:11.5px">${e?esc(e.title):''} · ${ltName(r.type)}</div></div>
        <div style="text-align:right"><div class="muted" style="font-size:11.5px">${fmtDate(r.from)}–${fmtDate(r.to)}</div>${badge(daysBetween(r.from,r.to)+' days','b-amber')}</div></div>`;}).join('')
      :(hol?'':'<div class="empty-state"><div class="ico">🌴</div>No one on leave this day</div>')}`;
  openModal(new Date(ds+'T00:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'}),body,null);
}
function requestLeave(){
  const canBehalf=isAdmin()||isManager();
  const emps=canBehalf?DB.employees.filter(e=>e.status!=='Terminated'):[];
  const body=(canBehalf?field('Employee (apply on behalf)','f-le',SESSION.empId,'select',emps.map(e=>({v:e.id,t:e.name}))):'')
    +field('Leave Type','f-lt',DB.leaveTypes[0].id,'select',DB.leaveTypes.map(t=>({v:t.id,t:t.name})))
    +`<div class="form-row two">${field('From','f-from',today(),'date')}${field('To','f-to',today(),'date')}</div>`
    +field('Reason','f-reason','','textarea');
  openModal('Request Leave',body,()=>{
    if(!val('f-from')||!val('f-to')){toast('Pick dates','err');return false;}
    const emp=canBehalf?(val('f-le')||SESSION.empId):SESSION.empId;
    const onBehalf=emp!==SESSION.empId;
    const r={id:uid('lr'),emp,type:val('f-lt'),from:val('f-from'),to:val('f-to'),reason:val('f-reason'),status:onBehalf?'Approved':'Pending',applied:today(),approver:onBehalf?SESSION.empId:undefined};
    DB.leaveRequests.push(r);
    if(onBehalf){ const b=DB.leaveBalances.find(x=>x.emp===emp&&x.type===r.type); if(b) b.used+=daysBetween(r.from,r.to);
      DB.notifications.push({id:uid('n'),to:emp,text:`${SESSION.name} applied leave on your behalf (${fmtDate(r.from)}–${fmtDate(r.to)})`,ts:today(),read:false,icon:'🌴'}); }
    else DB.notifications.push({id:uid('n'),to:DB.employees.find(e=>e.id===SESSION.empId)?.manager||'e3',text:`New leave request from ${SESSION.name}`,ts:today(),read:false,icon:'🌴'});
    log('Leave request',empName(emp)+' '+fmtDate(r.from)+'–'+fmtDate(r.to)); save(); navigate('leave'); updateNotifBadge(); toast(onBehalf?'Leave applied on behalf':'Leave requested','ok');
  },'Submit Request');
}
function approveLeave(id,decision){
  const r=DB.leaveRequests.find(x=>x.id===id); r.status=decision; r.approver=SESSION.empId;
  if(decision==='Approved'){ const b=DB.leaveBalances.find(x=>x.emp===r.emp&&x.type===r.type); if(b) b.used+=daysBetween(r.from,r.to); }
  DB.notifications.push({id:uid('n'),to:r.emp,text:`Your leave request was ${decision.toLowerCase()}`,ts:today(),read:false,icon:decision==='Approved'?'✅':'❌'});
  log(decision+' leave request',empName(r.emp)); save();
  const c=$('#leave-content'); if(c) c.innerHTML=leavePane();
  if(CURRENT_VIEW==='dashboard') navigate('dashboard');
  toast('Leave '+decision.toLowerCase(),'ok');
}

   TIME & ATTENDANCE
   ========================================================================= */
let attTab='today';
let attFilter={term:'',emp:'',status:'',flag:'',month:''};
function renderAttLog(){
  const ids=(isAdmin()?DB.employees:visibleEmployees()).map(e=>e.id);
  let rows=DB.attendance.filter(a=>ids.includes(a.emp));
  if(attFilter.emp) rows=rows.filter(a=>a.emp===attFilter.emp);
  if(attFilter.status) rows=rows.filter(a=>a.status===attFilter.status);
  if(attFilter.flag==='late') rows=rows.filter(a=>a.late);
  if(attFilter.flag==='ot') rows=rows.filter(a=>a.hours>9);

/* ----- clock with start / pause / resume / stop ----- */
function todayRec(){ return DB.attendance.find(a=>a.emp===SESSION.empId&&a.date===today()); }
function recOpenSeg(rec){ if(!rec||!rec.segments||!rec.segments.length) return null; const last=rec.segments[rec.segments.length-1]; return last.e==null?last:null; }
function workedMs(rec){ if(!rec) return 0; if(!rec.segments) return (rec.hours||0)*3.6e6; let t=0; rec.segments.forEach(s=>{t+=(s.e||Date.now())-s.s;}); return Math.max(0,t); }
function fmtHMS(ms){ const s=Math.max(0,Math.floor(ms/1000)); return [Math.floor(s/3600),Math.floor(s%3600/60),s%60].map(x=>String(x).padStart(2,'0')).join(':'); }
function refreshTodayClock(){ const c=$('#att-content'); if(c) c.innerHTML=attPane(); startClock(); }
function clockIn(){
  let rec=todayRec(); const now=Date.now(); const hhmm=new Date().toTimeString().slice(0,5);
  if(!rec){ const lateLimit=addMinutes(policy().shiftStart,policy().lateThresholdMin); rec={id:uid('at'),emp:SESSION.empId,date:today(),in:hhmm,out:'',segments:[{s:now,e:null}],onBreak:false,hours:0,status:'Present',late:hhmm>lateLimit}; DB.attendance.push(rec); }
  else { rec.out=''; rec.onBreak=false; if(!rec.segments) rec.segments=[]; rec.segments.push({s:now,e:null}); if(!rec.in) rec.in=hhmm; }
  finishClockAction(rec,'Clocked in at '+hhmm);
}
function clockPause(){ const rec=todayRec(); const open=recOpenSeg(rec); if(!open){toast('Not running','err');return;} open.e=Date.now(); rec.onBreak=true; finishClockAction(rec,'On break ⏸'); }
function clockResume(){ const rec=todayRec(); if(!rec||!rec.onBreak){toast('Not on break','err');return;} rec.segments.push({s:Date.now(),e:null}); rec.onBreak=false; finishClockAction(rec,'Resumed ▶'); }
function clockOut(){ const rec=todayRec(); if(!rec){toast('Not clocked in','err');return;} const open=recOpenSeg(rec); if(open) open.e=Date.now(); rec.onBreak=false; rec.out=new Date().toTimeString().slice(0,5); const h=workedMs(rec)/3.6e6; rec.hours=Math.round(h*10)/10; rec.status=h>0&&h<4?'Half Day':'Present'; finishClockAction(rec,'Clocked out — '+rec.hours+' hrs worked'); }
function finishClockAction(rec,msg){ save(); refreshTodayClock(); toast(msg,'ok'); }
function startClock(){ clearInterval(window._clk);
  const tick=()=>{ const el=$('#att-clock'); if(!el){clearInterval(window._clk);return;}
    const rec=todayRec(); const open=recOpenSeg(rec);
    const running=!!open&&!(rec&&rec.out); const paused=rec&&rec.onBreak&&!rec.out; const done=rec&&rec.out;
    if(running||paused||done) el.textContent=fmtHMS(workedMs(rec));
    else el.textContent=new Date().toLocaleTimeString();
  };
  tick(); window._clk=setInterval(tick,1000);
}

/* ----- payslip helpers (India statutory) ----- */
function psGross(ps){ return ps.basic+ps.hra+ps.transport+ps.special+(ps.bonus||0)+(ps.arrears||0); }
function psLopDays(ps){ return Math.max(0,(ps.lop||0)-(ps.lopReversal||0)); }
function psLopDed(ps){ return Math.round((ps.basic+ps.hra)/30*psLopDays(ps)); }
function psStat(ps){ return (ps.epf||0)+(ps.esi||0)+(ps.pt||0)+(ps.lwf||0)+(ps.tds||0); }
function psDed(ps){ return psStat(ps)+psLopDed(ps)+(ps.lateDeduction||0)+(ps.otherDeduction||0); }
function psNet(ps){ return psGross(ps)-psDed(ps); }
let selectedPayMonth='2026-06';
/* ----- payroll policy engine (configurable rules) ----- */
function policy(){ return DB.payrollPolicy||DEFAULT_PAYROLL_POLICY; }
function addMinutes(hhmm,min){ const [h,m]=(hhmm||'09:00').split(':').map(Number); const t=h*60+m+(+min||0); return String(Math.floor(t/60)%24).padStart(2,'0')+':'+String(t%60).padStart(2,'0'); }
function addMonths(dateStr,months){ const d=new Date((dateStr||today())+'T00:00:00'); if(isNaN(d.getTime())) return today(); d.setMonth(d.getMonth()+(+months||0)); return d.toISOString().slice(0,10); }
function monthsBetween(a,b){ const d1=new Date(a),d2=new Date(b); return (d2.getFullYear()-d1.getFullYear())*12+(d2.getMonth()-d1.getMonth()); }
/* Increment cadence per Handbook §26: ≤20k→6mo, 20k–30k→10mo, ≥30k→12mo */
function incrementCadence(monthly){ return monthly<20000?6:monthly<30000?10:12; }
function incrementInfo(empId){
  const e=DB.employees.find(x=>x.id===empId); const s=DB.salary.find(x=>x.emp===empId);
  const monthly=s?Math.round(s.annual/12):0; const cadence=incrementCadence(monthly);
  const revs=DB.salaryRevisions.filter(r=>r.emp===empId).slice().sort((a,b)=>b.date.localeCompare(a.date));
  const refDate=revs.length?revs[0].date:(e?e.startDate:today());
  const dueDate=addMonths(refDate,cadence);
  return {monthly,cadence,refDate,dueDate,due:dueDate<=today()};
}
function calcStatPolicy(basic,gross){ const p=policy();
  if(!p.statutoryEnabled) return {epf:0,esi:0,pt:0,lwf:0};   // base salary only — no statutory cuts
  const epf=Math.round((p.epfRate/100)*Math.min(basic,p.epfCap||basic));
  const esi=gross<=(p.esiThreshold||21000)?Math.round((p.esiRate/100)*gross):0;
  return {epf,esi,pt:p.ptAmount||0,lwf:p.lwfAmount||0};
}
function customDeductionTotal(){ return (policy().customRules||[]).filter(r=>r.apply&&+r.amount>0).reduce((s,r)=>s+(+r.amount),0); }
function lateMarksFor(empId,month){ return DB.attendance.filter(a=>a.emp===empId&&a.date.startsWith(month)&&a.late).length; }
/* unplanned (Unpaid/LOP/Comp-off) leave days in the month, honouring sandwich rule */
function unplannedLopDays(empId,month){ const p=policy();
  const reqs=DB.leaveRequests.filter(r=>r.emp===empId&&r.status==='Approved'&&/unpaid|lop|loss of pay/i.test(ltName(r.type)));
  let days=0;
  reqs.forEach(r=>{ let cur=new Date(r.from+'T00:00:00'); const end=new Date(r.to+'T00:00:00');
    while(cur<=end){ const ds=cur.toISOString().slice(0,10); const dow=cur.getDay();
      if(ds.startsWith(month)){ if(p.sandwichLeave) days++; else if(dow!==0&&dow!==6) days++; }
      cur.setDate(cur.getDate()+1); } });
  return days;
}
/* compute auto deductions for a month from attendance + leave + policy */
function autoDeductions(empId,month){ const p=policy();
  const marks=lateMarksFor(empId,month); const extra=Math.max(0,marks-(p.lateGraceMarks||0));
  let lateDeduction=0, lopFromLate=0;
  if(p.lateRule==='halfday') lopFromLate=Math.floor(extra/(p.latesPerLopDay||3));
  else lateDeduction=extra*(p.latePerMark||0);
  // unplanned (unpaid) leave: first N free (paid-leave allowance), rest × penalty multiplier
  const rawUnplanned=p.unplannedLop?unplannedLopDays(empId,month):0;
  const chargeable=Math.max(0,rawUnplanned-(p.paidLeavesPerMonth||0));
  const unplannedLopD=chargeable*(p.unplannedPenaltyMultiplier||1);
  // half-days beyond the monthly free allowance → ½ day each
  const halfMarks=DB.attendance.filter(a=>a.emp===empId&&a.date.startsWith(month)&&a.status==='Half Day').length;
  const extraHalf=Math.max(0,halfMarks-(p.halfDayAllowance||0));
  const lop=unplannedLopD+lopFromLate+extraHalf*0.5;
  return {lop,lateDeduction,lateMarks:marks};
}

/* Build a payslip applying current policy: statutory rates + auto late/leave deductions */
function buildPayslip(emp,month){
  const s=DB.salary.find(x=>x.emp===emp.id); if(!s) return null;
  const gross=s.basic+s.hra+s.transport+s.special;
  const st=calcStatPolicy(s.basic,gross);
  const auto=autoDeductions(emp.id,month);
  const lateDed = policy().lateRule==='amount' ? auto.lateDeduction : 0;
  const tds = policy().statutoryEnabled ? (s.tds||0) : 0;
  return {id:uid('ps'),emp:emp.id,month,basic:s.basic,hra:s.hra,transport:s.transport,special:s.special,
    bonus:0,arrears:0,epf:st.epf,esi:st.esi,pt:st.pt,lwf:st.lwf,tds,
    lop:auto.lop,lopReversal:0,lateMarks:auto.lateMarks,lateDeduction:lateDed,otherDeduction:customDeductionTotal(),
    status:'Generated',disbursement:'Pending',generatedOn:today()};
}
function recalcRun(month){ const run=DB.payrollRuns.find(r=>r.month===month);
  const sl=DB.payslips.filter(p=>p.month===month);
  if(run){ run.status='Processed'; run.employees=sl.length; run.gross=sl.reduce((a,p)=>a+psGross(p),0); run.deductions=sl.reduce((a,p)=>a+psDed(p),0); run.net=sl.reduce((a,p)=>a+psNet(p),0); run.processedOn=today(); }
  else if(sl.length){ DB.payrollRuns.push({id:uid('pr'),month,status:'Processed',employees:sl.length,gross:sl.reduce((a,p)=>a+psGross(p),0),deductions:sl.reduce((a,p)=>a+psDed(p),0),net:sl.reduce((a,p)=>a+psNet(p),0),processedOn:today()}); }
}
function notifyPayslip(empId,month){ DB.notifications.push({id:uid('n'),to:empId,text:'Your payslip for '+new Date(month+'-01').toLocaleDateString('en-US',{month:'long',year:'numeric'})+' is ready',ts:today(),read:false,icon:'💰'}); }
function generatePayslips(){
  const active=DB.employees.filter(e=>e.status!=='Terminated');
  let created=0;
  active.forEach(e=>{
    if(DB.payslips.find(p=>p.emp===e.id&&p.month===selectedPayMonth)) return;
    const ps=buildPayslip(e,selectedPayMonth); if(!ps) return;
    DB.payslips.push(ps); notifyPayslip(e.id,selectedPayMonth); created++;
  });
  recalcRun(selectedPayMonth);
  log('Generated payslips (auto)',new Date(selectedPayMonth+'-01').toLocaleDateString('en-US',{month:'long',year:'numeric'})+' ('+created+')');
  save(); updateNotifBadge(); rerenderPay();
  toast(created?created+' payslips generated with rules applied':'All payslips already exist','ok');
}
function generateOneModal(){
  const emps=DB.employees.filter(e=>e.status!=='Terminated');
  const body=field('Employee','f-ge',emps[0]?.id,'select',emps.map(e=>({v:e.id,t:e.name})))
    +`<p class="muted" style="font-size:12px;margin-top:6px">Generates a payslip for ${new Date(selectedPayMonth+'-01').toLocaleDateString('en-US',{month:'long',year:'numeric'})} applying current rules. You can fine-tune it afterwards via Edit.</p>`;
  openModal('Generate Payslip — single employee',body,()=>{
    const e=DB.employees.find(x=>x.id===val('f-ge'));
    if(DB.payslips.find(p=>p.emp===e.id&&p.month===selectedPayMonth)){toast('Payslip already exists for this month','err');return false;}
    const ps=buildPayslip(e,selectedPayMonth); if(!ps){toast('No salary structure — set it first','err');return false;}
    DB.payslips.push(ps); notifyPayslip(e.id,selectedPayMonth); recalcRun(selectedPayMonth);
    log('Generated payslip',e.name+' '+selectedPayMonth); save(); updateNotifBadge(); rerenderPay(); toast('Payslip generated for '+e.name,'ok');
  },'Generate');
}

function recordRevision(){
  const body=field('Employee','f-re',DB.employees[0].id,'select',DB.employees.map(e=>({v:e.id,t:e.name})))
    +`<div class="form-row two">${field('New Monthly CTC','f-rnew','','number')}${field('Effective Date','f-rdate',today(),'date')}</div>`
    +field('Reason','f-rreason','Annual increment');
  openModal('Record Salary Revision',body,()=>{
    const e=DB.employees.find(x=>x.id===val('f-re'));
    const newMonthly=+val('f-rnew'); if(!newMonthly){toast('Enter a valid new CTC','err');return false;}
    let s=DB.salary.find(x=>x.emp===e.id);
    if(!s){ ensureSalary(e.id,e.role,e.empType); s=DB.salary.find(x=>x.emp===e.id); }
    const oldCtc=s.annual||0; const newCtc=newMonthly*12; const pct=oldCtc?Math.round((newCtc-oldCtc)/oldCtc*100):0;
    DB.salaryRevisions.unshift({id:uid('sr'),emp:e.id,date:val('f-rdate'),oldCtc,newCtc,reason:val('f-rreason'),pct});
    // apply new structure
    const basic=Math.round(newMonthly*0.5),hra=Math.round(newMonthly*0.2),transport=1600,special=newMonthly-basic-hra-transport;
    Object.assign(s,{basic,hra,transport,special,annual:newCtc});
    DB.notifications.push({id:uid('n'),to:e.id,text:'Your salary has been revised to '+fmtMoney(newCtc)+' CTC',ts:today(),read:false,icon:'📈'});
    log('Recorded salary revision',e.name+' → '+fmtMoney(newCtc)); save(); rerenderPay(); updateNotifBadge(); toast('Revision recorded','ok');
  },'Save Revision');
}

function refreshAts(){ const el=$('#ats-content'); if(el){ el.innerHTML=atsPane(); if(atsTab==='shortlist') renderShortlist(); if(AFTER.ats) AFTER.ats(); } }
function candidateForm(c={}){
  return `<div class="form-row two">${field('Full Name','f-cn',c.name||'')}${field('Position','f-cpos',c.position||POSITIONS[0],'select',POSITIONS)}</div>

    <div class="form-row two">${field('Stage','f-cstage',c.stage||'Sourced','select',ATS_STAGES)}${field('Status','f-cstatus',c.status||'','select',ATS_STATUS.map(s=>({v:s,t:s||'— none —'})))}</div>
    <div class="form-row two">${field('Contacted Date','f-cdate',c.contactedDate||today(),'date')}${field('Work Mode','f-cmode',c.mode||'On-Site','select',WORK_MODE)}</div>
    <div class="form-row two">${field('Experience','f-cexp',c.experience||'')}${field('Score (0–5)','f-cscore',c.score||0,'select',[0,1,2,3,4,5])}</div>
    <div class="form-row two">${field('Current Salary','f-ccur',c.currentSalary||'')}${field('Expected Salary','f-cexpd',c.expectedSalary||'')}</div>
    ${field('LinkedIn URL','f-clinkedin',c.linkedin||'')}
    <div class="form-row"><label>CV — paste link</label><input type="text" id="f-cvlink" value="${esc(c.cvLink&&!String(c.cvLink).startsWith('data:')?c.cvLink:'')}" placeholder="https://drive.google.com/…"></div>
    <div class="form-row"><label>…or upload CV ${c.cvName?`<span class="muted">(current: ${esc(c.cvName)})</span>`:''}</label><input type="file" id="f-cvfile" accept=".pdf,.doc,.docx,.png,.jpg"></div>
    <div class="form-row"><label>Portfolio — paste link</label><input type="text" id="f-pflink" value="${esc(c.portfolio&&!String(c.portfolio).startsWith('data:')?c.portfolio:'')}" placeholder="Behance / Drive / website"></div>
    <div class="form-row"><label>…or upload Portfolio ${c.portfolioName?`<span class="muted">(current: ${esc(c.portfolioName)})</span>`:''}</label><input type="file" id="f-pffile" accept=".pdf,.png,.jpg,.zip"></div>
    ${field('Notes','f-cnotes',c.notes||'','textarea')}`;
}
function readFileAsDataURL(input,cb){
  if(!input||!input.files||!input.files[0]){ cb(null); return; }
  const f=input.files[0];
  if(f.size>2*1024*1024){ toast(f.name+' >2MB — stored by name only','err'); cb({name:f.name,url:''}); return; }
  const r=new FileReader(); r.onload=()=>cb({name:f.name,url:r.result}); r.onerror=()=>cb({name:f.name,url:''}); r.readAsDataURL(f);
}
function collectCandidate(c,done){
  c.name=val('f-cn');c.position=val('f-cpos');c.phone=val('f-cp');c.contactedThrough=val('f-cv');
  c.stage=val('f-cstage');c.status=val('f-cstatus')==='— none —'?'':val('f-cstatus');c.contactedDate=val('f-cdate');
  c.mode=val('f-cmode');c.experience=val('f-cexp');c.score=+val('f-cscore');c.currentSalary=val('f-ccur');
  c.expectedSalary=val('f-cexpd');c.linkedin=val('f-clinkedin');c.notes=val('f-cnotes');
  readFileAsDataURL($('#f-cvfile'),cv=>{
    if(cv){ c.cvLink=cv.url||val('f-cvlink'); c.cvName=cv.name; } else { c.cvLink=val('f-cvlink'); }
    readFileAsDataURL($('#f-pffile'),pf=>{
      if(pf){ c.portfolio=pf.url||val('f-pflink'); c.portfolioName=pf.name; } else { c.portfolio=val('f-pflink'); }
      done();
    });
  });
}
function addCandidate(){
  openModal('Add Candidate', candidateForm(), ()=>{
    if(!val('f-cn')){toast('Name required','err');return false;}
    const c={id:uid('c'),level1:'',level2:''};
    collectCandidate(c,()=>{ DB.candidates.push(c); log('Added candidate',c.name); save(); closeModal(); refreshAts(); toast('Candidate added','ok'); });
    return false;
  },'Add Candidate');
}
function editCandidate(id){
  const c=DB.candidates.find(x=>x.id===id);
  openModal('Edit Candidate', candidateForm(c), ()=>{
    if(!val('f-cn')){toast('Name required','err');return false;}
    collectCandidate(c,()=>{ log('Edited candidate',c.name); save(); closeModal(); refreshAts(); toast('Candidate saved','ok'); });
    return false;
  });
}

let onbTab='onboarding';
VIEWS.onboarding = () => {
  return `<div class="section-head"><div><h2>Onboarding & Offboarding</h2><div class="desc">Structured workflows for joiners & leavers</div></div></div>
    <div class="tabs">
      <div class="tab${onbTab==='onboarding'?' active':''}" onclick="onbTab='onboarding';navigate('onboarding')">Onboarding</div>
      <div class="tab${onbTab==='probation'?' active':''}" onclick="onbTab='probation';navigate('onboarding')">Probation</div>
      <div class="tab${onbTab==='offboarding'?' active':''}" onclick="onbTab='offboarding';navigate('onboarding')">Offboarding</div>
    </div><div id="onb-content">${onbPane()}</div>`;
};
const PROBATION_MONTHS=2;
function onbPane(){
  if(onbTab==='probation'){
    const onProb=DB.employees.filter(e=>e.status==='Probation');
    return `<div class="section-head" style="margin-bottom:12px"><div class="muted" style="font-size:13px">Handbook §13 — ${PROBATION_MONTHS}-month probation. First 10 days: immediate termination possible. Confirm in writing on satisfactory review.</div></div>
      <div class="card"><div class="table-wrap"><table><thead><tr><th>Employee</th><th>Joined</th><th>Probation Ends</th><th>Days Left</th><th>Status</th>${isAdmin()?'<th>Actions</th>':''}</tr></thead><tbody>
      ${onProb.map(e=>{const end=e.probationEnd||addMonths(e.startDate,PROBATION_MONTHS); const daysLeft=Math.round((new Date(end)-new Date(today()))/864e5); const over=daysLeft<0;
        return `<tr><td><div class="emp-cell">${empAvatar(e.id)}<div class="nm">${esc(e.name)}</div></div></td>
        <td>${fmtDate(e.startDate)}</td><td>${fmtDate(end)}</td><td>${over?badge(Math.abs(daysLeft)+'d overdue','b-red'):badge(daysLeft+' days','b-amber')}</td>
        <td>${sbadge('Probation')}</td>
        ${isAdmin()?`<td style="white-space:nowrap"><button class="btn btn-sm btn-primary" onclick="confirmProbation('${e.id}')">✓ Confirm</button> <button class="btn btn-sm" onclick="extendProbation('${e.id}')">Extend</button></td>`:''}</tr>`;}).join('')
        ||'<tr><td colspan="6"><div class="empty-state"><div class="ico">🎓</div>No employees currently on probation</div></td></tr>'}
    </tbody></table></div></div>`;
  }
  if(onbTab==='onboarding'){
    const newHires=[...new Set(DB.onboardTasks.map(t=>t.emp))];
    return newHires.map(eid=>{
      const tasks=DB.onboardTasks.filter(t=>t.emp===eid);
      const done=tasks.filter(t=>t.status==='Completed').length; const pct=Math.round(done/tasks.length*100);
      return `<div class="card card-pad" style="margin-bottom:16px">
        <div class="section-head" style="margin-bottom:12px"><div class="emp-cell">${empAvatar(eid,'avatar')}<div><div class="nm" style="font-weight:700">${empName(eid)}</div><div class="sub muted">${tasks.length} tasks · started ${fmtDate(DB.employees.find(e=>e.id===eid)?.startDate)}</div></div></div>
          <div style="text-align:right"><b>${pct}%</b><div class="progress" style="width:120px;margin-top:4px"><span style="width:${pct}%;background:${pct===100?'var(--green)':'var(--brand)'}"></span></div></div></div>
        <div class="table-wrap"><table><thead><tr><th>Task</th><th>Type</th><th>Owner</th><th>Due</th><th>Status</th><th></th></tr></thead><tbody>
        ${tasks.map(t=>`<tr><td>${esc(t.task)}</td><td>${t.type}</td><td>${badge(t.owner,'b-blue')}</td><td>${fmtDate(t.due)}</td><td>${sbadge(t.status)}</td>
          <td>${t.status!=='Completed'?`<button class="btn btn-sm btn-primary" onclick="completeOnbTask('${t.id}')">Mark Done</button>`:'✓'}</td></tr>`).join('')}</tbody></table></div></div>`;
    }).join('');
  }
  return `<div class="card card-pad"><h3 style="margin-bottom:6px">Offboarding</h3><p class="muted" style="margin-bottom:16px">Trigger when an employee status changes to Terminating. Standard exit checklist below.</p>
    <div class="table-wrap"><table><thead><tr><th>Exit Task</th><th>Owner</th><th>Status</th></tr></thead><tbody>
    ${['Return equipment','Revoke system access','Final payroll settlement','Exit interview','Knowledge transfer'].map(t=>`<tr><td>${t}</td><td>${badge('HR / IT','b-blue')}</td><td>${badge('Template','b-gray')}</td></tr>`).join('')}
    </tbody></table></div>
    <p class="muted" style="margin-top:14px">No active offboarding workflows. When an employee is marked <b>Terminating</b>, their exit checklist is generated here automatically.</p></div>`;
}
function completeOnbTask(id){ const t=DB.onboardTasks.find(x=>x.id===id); t.status='Completed'; log('Completed onboarding task',t.task); save(); const c=$('#onb-content'); if(c) c.innerHTML=onbPane(); toast('Task completed','ok'); }
function confirmProbation(id){ const e=DB.employees.find(x=>x.id===id); if(!confirm('Confirm '+e.name+' as a permanent employee?'))return; e.status='Active';
  DB.notifications.push({id:uid('n'),to:e.id,text:'Congratulations! Your probation is confirmed — you are now a permanent employee.',ts:today(),read:false,icon:'🎉'});
  log('Confirmed probation',e.name); save(); const c=$('#onb-content'); if(c) c.innerHTML=onbPane(); updateNotifBadge(); toast(e.name+' confirmed','ok'); }
function extendProbation(id){ const e=DB.employees.find(x=>x.id===id);
  openModal('Extend Probation — '+e.name, field('Extend by (months)','f-ext','1','number')+field('Reason','f-extr','','textarea'), ()=>{
    const m=+val('f-ext')||1;

    log('Extended probation',e.name+' +'+m+'mo'); save(); const c=$('#onb-content'); if(c) c.innerHTML=onbPane(); updateNotifBadge(); toast('Probation extended','ok');
  },'Extend');
}

    return `<div class="card"><div class="table-wrap"><table><thead><tr><th>Employee</th><th>Goal</th><th>Target</th><th>Weight</th><th>Progress</th><th>Status</th><th></th></tr></thead><tbody>

    return `<div class="card"><div class="table-wrap"><table><thead><tr><th>Employee</th><th>Cycle</th><th>Type</th><th>Reviewer</th><th>Rating</th><th>Status</th></tr></thead><tbody>
      ${reviews.map(r=>`<tr><td><div class="emp-cell">${empAvatar(r.emp)}<div class="nm">${empName(r.emp)}</div></div></td>
        <td>${DB.reviewCycles.find(c=>c.id===r.cycle)?.name||'—'}</td><td>${r.type}</td><td>${empName(r.reviewer)}</td>

    </tbody></table></div></div>`;
  }
  if(perfTab==='feedback'){
    let fb=DB.feedback.filter(f=>isAdmin()||f.to===SESSION.empId||f.from===SESSION.empId);
    return `<div class="section-head" style="margin-bottom:12px"><div></div><button class="btn btn-primary btn-sm" onclick="giveFeedback()">+ Give Feedback</button></div>
      ${fb.map(f=>`<div class="card card-pad" style="margin-bottom:10px"><div style="display:flex;justify-content:space-between"><div><b>${empName(f.from)}</b> → <b>${empName(f.to)}</b> ${badge(f.type,f.type==='Praise'?'b-green':'b-amber')}</div><span class="muted" style="font-size:12px">${fmtDate(f.date)}</span></div>
        <p style="margin-top:8px">${esc(f.msg)}</p></div>`).join('')||'<div class="empty-state"><div class="ico">💬</div>No feedback yet</div>'}`;
  }
  if(perfTab==='cycles'){
    return `<div class="card"><div class="table-wrap"><table><thead><tr><th>Cycle</th><th>Type</th><th>Due</th><th>Status</th></tr></thead><tbody>
      ${DB.reviewCycles.map(c=>`<tr><td><b>${esc(c.name)}</b></td><td>${c.type}</td><td>${fmtDate(c.due)}</td><td>${sbadge(c.status)}</td></tr>`).join('')}
    </tbody></table></div></div>`;
  }

function addGoal(){

    +field('Goal Title','f-gt','')

let lmsTab='mycourses';
VIEWS.lms = () => {
  const tabs=SESSION.role==='Employee'?[['mycourses','My Courses'],['certs','Certifications']]
    :[['mycourses','My Courses'],['catalog','Course Catalog'],['certs','Certifications'],['reports','Reports']];
  if(!tabs.find(t=>t[0]===lmsTab)) lmsTab='mycourses';
  return `<div class="section-head"><div><h2>Learning & Development</h2><div class="desc">Courses, training & certifications</div></div>
    ${isAdmin()?'<button class="btn btn-primary" onclick="addCourse()">+ Add Course</button>':''}</div>
    <div class="tabs">${tabs.map(t=>`<div class="tab${lmsTab===t[0]?' active':''}" onclick="lmsTab='${t[0]}';navigate('lms')">${t[1]}</div>`).join('')}</div>
    <div id="lms-content">${lmsPane()}</div>`;
};
function lmsPane(){
  if(lmsTab==='mycourses'){
    const mine=DB.courseAssign.filter(a=>a.emp===SESSION.empId);
    return `<div class="grid-3">${mine.map(a=>{const c=DB.courses.find(x=>x.id===a.course);const pct=a.status==='Completed'?100:(a.progress||0);
      return `<div class="card card-pad"><div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:8px"><span class="badge-pill b-blue">${c.category}</span>${c.mandatory?badge('Mandatory','b-red'):''}</div>
        <h3 style="font-size:14px;margin-bottom:4px">${esc(c.title)}</h3><div class="muted" style="font-size:12px;margin-bottom:10px">${c.type} · ${c.duration}</div>
        <div class="progress" style="margin-bottom:6px"><span style="width:${pct}%;background:${pct===100?'var(--green)':'var(--brand)'}"></span></div>
        <div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:12px">${sbadge(a.status)}</span>
        ${a.status!=='Completed'?`<button class="btn btn-sm btn-primary" onclick="completeCourse('${a.id}')">${a.status==='Not Started'?'Start':'Complete'}</button>`:'✓ Done'}</div></div>`;}).join('')
      ||'<div class="empty-state" style="grid-column:1/-1"><div class="ico">📚</div>No courses assigned</div>'}</div>`;
  }
  if(lmsTab==='catalog'){
    return `<div class="card"><div class="table-wrap"><table><thead><tr><th>Course</th><th>Category</th><th>Type</th><th>Duration</th><th>Mandatory</th><th>Enrolled</th><th></th></tr></thead><tbody>
      ${DB.courses.map(c=>`<tr><td><b>${esc(c.title)}</b></td><td>${badge(c.category,'b-blue')}</td><td>${c.type}</td><td>${c.duration}</td>
        <td>${c.mandatory?badge('Yes','b-red'):badge('No','b-gray')}</td><td>${DB.courseAssign.filter(a=>a.course===c.id).length}</td>
        <td><button class="btn btn-sm" onclick="assignCourse('${c.id}')">Assign</button></td></tr>`).join('')}
    </tbody></table></div></div>`;
  }
  if(lmsTab==='certs'){
    let certs=isAdmin()?DB.certifications:DB.certifications.filter(c=>c.emp===SESSION.empId);
    return `<div class="card"><div class="table-wrap"><table><thead><tr><th>Employee</th><th>Certification</th><th>Issuer</th><th>Issued</th><th>Expiry</th><th></th></tr></thead><tbody>
      ${certs.map(c=>{const exp=new Date(c.expiry)<new Date(); const soon=!exp&&(new Date(c.expiry)-new Date())<60*864e5;
        return `<tr><td><div class="emp-cell">${empAvatar(c.emp)}<div class="nm">${empName(c.emp)}</div></div></td><td><b>${esc(c.name)}</b></td><td>${esc(c.issuer)}</td>
        <td>${fmtDate(c.issued)}</td><td>${fmtDate(c.expiry)} ${exp?badge('Expired','b-red'):soon?badge('Expiring soon','b-amber'):''}</td><td>📄 ${c.file}</td></tr>`;}).join('')
        ||'<tr><td colspan="6"><div class="empty-state"><div class="ico">🎓</div>No certifications</div></td></tr>'}</tbody></table></div></div>`;
  }
  if(lmsTab==='reports'){
    const byDept=DB.departments.map(d=>{const ids=DB.employees.filter(e=>e.dept===d.id).map(e=>e.id);
      const a=DB.courseAssign.filter(x=>ids.includes(x.emp));const done=a.filter(x=>x.status==='Completed').length;
      return {d:d.name,pct:a.length?Math.round(done/a.length*100):0,n:a.length};});
    return `<div class="card card-pad"><h3 style="margin-bottom:14px">Course Completion by Department</h3>
      ${byDept.filter(x=>x.n).map(x=>`<div style="margin-bottom:11px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px"><span>${x.d}</span><b>${x.pct}% (${x.n} assigned)</b></div><div class="progress"><span style="width:${x.pct}%"></span></div></div>`).join('')}</div>`;
  }
}
function completeCourse(id){ const a=DB.courseAssign.find(x=>x.id===id);
  if(a.status==='Not Started'){a.status='In Progress';a.progress=25;toast('Course started','ok');}
  else{a.status='Completed';a.progress=100;toast('Course completed 🎉','ok');}
  log('Course progress',DB.courses.find(c=>c.id===a.course)?.title); save(); const c=$('#lms-content'); if(c) c.innerHTML=lmsPane();
}
function assignCourse(courseId){
  const body=field('Assign to','f-ae',DB.employees[0].id,'select',DB.employees.map(e=>({v:e.id,t:e.name})))+field('Due Date','f-ad',today(),'date');
  openModal('Assign Course',body,()=>{
    DB.courseAssign.push({id:uid('ca'),emp:val('f-ae'),course:courseId,due:val('f-ad'),status:'Not Started'});
    DB.notifications.push({id:uid('n'),to:val('f-ae'),text:'New course assigned to you',ts:today(),read:false,icon:'📚'});
    log('Assigned course',empName(val('f-ae'))); save(); navigate('lms'); updateNotifBadge(); toast('Course assigned','ok');
  },'Assign');
}
function addCourse(){
  const body=field('Course Title','f-ct','')
    +`<div class="form-row two">${field('Category','f-cc','Technical','select',['Compliance','Technical','Soft Skills','Leadership','Onboarding'])}${field('Type','f-cty','Video','select',['Video','PDF','External URL'])}</div>`
    +`<div class="form-row two">${field('Duration','f-cd','1 hr')}${field('Mandatory','f-cm','No','select',['No','Yes'])}</div>`;
  openModal('Add Course',body,()=>{
    if(!val('f-ct')){toast('Title required','err');return false;}
    DB.courses.push({id:uid('co'),title:val('f-ct'),category:val('f-cc'),type:val('f-cty'),duration:val('f-cd'),mandatory:val('f-cm')==='Yes'});
    log('Created course',val('f-ct')); save(); navigate('lms'); toast('Course added','ok');
  },'Add Course');
}

let engTab='recognition';
VIEWS.engagement = () => {
  const tabs=[['recognition','Recognition'],['celebrations','Celebrations'],['surveys','Surveys'],['enps','eNPS']];
  if(!tabs.find(t=>t[0]===engTab)) engTab='recognition';
  return `<div class="section-head"><div><h2>Employee Engagement</h2><div class="desc">Recognition, celebrations & pulse surveys</div></div>

const BADGE_EMOJI={'Team Player':'🤝','Innovator':'💡','Above & Beyond':'🚀','Customer Hero':'⭐'};
function engPane(){
  if(engTab==='recognition'){
    const leaders={}; DB.recognitions.forEach(r=>leaders[r.to]=(leaders[r.to]||0)+1);
    const top=Object.entries(leaders).sort((a,b)=>b[1]-a[1]).slice(0,3);
    return `<div class="grid-2"><div>
      ${DB.recognitions.slice().sort((a,b)=>b.date.localeCompare(a.date)).map(r=>`<div class="card card-pad" style="margin-bottom:12px">
        <div style="display:flex;gap:12px"><span class="avatar">${initials(empName(r.to))}</span><div style="flex:1">
        <div><b>${empName(r.from)}</b> recognized <b>${empName(r.to)}</b></div>
        <div style="margin:6px 0">${badge(BADGE_EMOJI[r.badge]+' '+r.badge,'b-purple')}</div>
        <p>${esc(r.msg)}</p><div class="muted" style="font-size:12px;margin-top:6px">❤️ ${r.likes} · ${fmtDate(r.date)}</div></div></div></div>`).join('')}</div>
      <div><div class="card card-pad"><h3 style="margin-bottom:12px">🏆 Recognition Leaderboard</h3>
        ${top.map(([id,n],i)=>`<div class="list-row">${['🥇','🥈','🥉'][i]} ${empAvatar(id)}<div style="flex:1"><b>${empName(id)}</b></div><span class="badge-pill b-purple">${n} shoutouts</span></div>`).join('')}</div></div></div>`;
  }
  if(engTab==='celebrations'){
    const data=DB.employees.filter(e=>e.status!=='Terminated').map(e=>{
      const b=new Date(e.dob),s=new Date(e.startDate),now=new Date();
      const yrs=now.getFullYear()-s.getFullYear();
      return {e,bMonth:b.getMonth(),bDay:b.getDate(),sMonth:s.getMonth(),sDay:s.getDate(),yrs};
    });
    const mo=new Date().getMonth();
    const milestones=[1,3,5,10];
    return `<div class="grid-2">
      <div class="card card-pad"><h3 style="margin-bottom:12px">🎂 Birthdays This Month</h3>
        ${data.filter(d=>d.bMonth===mo).sort((a,b)=>a.bDay-b.bDay).map(d=>`<div class="list-row">${empAvatar(d.e.id)}<div style="flex:1"><b>${esc(d.e.name)}</b><div class="muted" style="font-size:11.5px">${deptName(d.e.dept)}</div></div><span class="badge-pill b-amber">${new Date(d.e.dob).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span></div>`).join('')||'<div class="muted">None this month</div>'}</div>
      <div class="card card-pad"><h3 style="margin-bottom:12px">🎉 Work Anniversaries This Month</h3>
        ${data.filter(d=>d.sMonth===mo).sort((a,b)=>a.sDay-b.sDay).map(d=>`<div class="list-row">${empAvatar(d.e.id)}<div style="flex:1"><b>${esc(d.e.name)}</b><div class="muted" style="font-size:11.5px">${fmtDate(d.e.startDate)}</div></div><span class="badge-pill ${milestones.includes(d.yrs)?'b-purple':'b-green'}">${d.yrs} yr${milestones.includes(d.yrs)?' 🏅':''}</span></div>`).join('')||'<div class="muted">None this month</div>'}</div></div>`;
  }
  if(engTab==='surveys'){
    return `<div class="section-head" style="margin-bottom:12px"><div></div>${isAdmin()?'<button class="btn btn-primary btn-sm" onclick="createSurvey()">+ Create Survey</button>':''}</div>
      ${DB.surveys.map(s=>`<div class="card card-pad" style="margin-bottom:12px"><div class="section-head" style="margin-bottom:8px">
        <div><h3 style="font-size:15px">${esc(s.title)}</h3><div class="muted" style="font-size:12px">${s.type} · ${s.anon?'Anonymous':'Named'} · ${s.questions.length} questions</div></div>
        <div style="text-align:right">${sbadge(s.status)}<div class="muted" style="font-size:12px;margin-top:4px">${s.responses}/${s.total} responses</div></div></div>
        <div class="progress"><span style="width:${Math.round(s.responses/s.total*100)}%;background:var(--green)"></span></div></div>`).join('')}`;
  }
  if(engTab==='enps'){
    const latest=DB.enps[DB.enps.length-1].score;
    return `<div class="kpis"><div class="kpi"><div class="label">Current eNPS</div><div class="val" style="color:var(--green)">+${latest}</div><div class="sub">Employee Net Promoter Score</div></div>
      ${kpi('Promoters','58%','Score 9–10','😍','var(--green-soft)')}${kpi('Passives','30%','Score 7–8','😐','var(--amber-soft)')}${kpi('Detractors','12%','Score 0–6','😞','var(--red-soft)')}</div>
      <div class="card card-pad"><h3 style="margin-bottom:10px">eNPS Trend (6 months)</h3><canvas id="eng-enps" height="90"></canvas></div>`;
  }
}
function giveRecognition(){
  const body=field('Recognize','f-rt',DB.employees.find(e=>e.id!==SESSION.empId).id,'select',DB.employees.filter(e=>e.id!==SESSION.empId).map(e=>({v:e.id,t:e.name})))
    +field('Badge','f-rb','Team Player','select',Object.keys(BADGE_EMOJI))
    +field('Message','f-rm','','textarea');
  openModal('Give Recognition',body,()=>{
    if(!val('f-rm')){toast('Add a message','err');return false;}
    DB.recognitions.unshift({id:uid('rec'),from:SESSION.empId,to:val('f-rt'),badge:val('f-rb'),msg:val('f-rm'),date:today(),likes:0});
    log('Gave recognition',empName(val('f-rt'))); save(); navigate('engagement'); toast('Recognition shared 🎉','ok');
  },'Share');
}
function createSurvey(){
  const body=field('Survey Title','f-st','')+field('Type','f-sty','One-time','select',['One-time','Recurring'])+field('Anonymous','f-sa','Yes','select',['Yes','No'])+field('First Question','f-sq','How satisfied are you at work?');
  openModal('Create Survey',body,()=>{
    if(!val('f-st')){toast('Title required','err');return false;}
    DB.surveys.unshift({id:uid('sv'),title:val('f-st'),type:val('f-sty'),status:'Active',anon:val('f-sa')==='Yes',responses:0,total:DB.employees.filter(e=>e.status==='Active').length,questions:[val('f-sq')]});
    log('Created survey',val('f-st')); save(); navigate('engagement'); toast('Survey published','ok');
  },'Publish');

AFTER.engagement = () => { if(engTab==='enps'){ new Chart($('#eng-enps'),{type:'line',data:{labels:DB.enps.map(e=>new Date(e.month+'-01').toLocaleDateString('en-US',{month:'short'})),datasets:[{label:'eNPS',data:DB.enps.map(e=>e.score),borderColor:'#16a34a',backgroundColor:'rgba(22,163,74,.1)',fill:true,tension:.3}]},options:{plugins:{legend:{display:false}}}}); } };

let compTab='policies';
VIEWS.compliance = () => {
  const tabs=[['policies','Policies'],['audit','Audit Trail'],['reports','Reports']];
  if(!tabs.find(t=>t[0]===compTab)) compTab='policies';
  return `<div class="section-head"><div><h2>Compliance & Reporting</h2><div class="desc">Policies, audit log & data exports</div></div>
    <button class="btn btn-primary" onclick="addPolicy()">+ Publish Policy</button></div>
    <div class="tabs">${tabs.map(t=>`<div class="tab${compTab===t[0]?' active':''}" onclick="compTab='${t[0]}';navigate('compliance')">${t[1]}</div>`).join('')}</div>
    <div id="comp-content">${compPane()}</div>`;
};
function compPane(){
  const totalEmp=DB.employees.filter(e=>e.status==='Active').length;
  if(compTab==='policies'){
    return `<div class="card"><div class="table-wrap"><table><thead><tr><th>Policy</th><th>Version</th><th>Published</th><th>Acknowledged</th><th>Status</th></tr></thead><tbody>
      ${DB.policies.map(p=>{const pct=Math.round(p.acks/totalEmp*100);return `<tr><td><b>📋 ${esc(p.name)}</b></td><td>v${p.version}</td><td>${fmtDate(p.published)}</td>
        <td><div style="display:flex;align-items:center;gap:8px"><div class="progress"><span style="width:${pct}%;background:${pct===100?'var(--green)':'var(--amber)'}"></span></div>${p.acks}/${totalEmp}</div></td>
        <td>${pct===100?badge('Complete','b-green'):badge('Pending acks','b-amber')}</td></tr>`;}).join('')}
    </tbody></table></div></div>`;
  }
  if(compTab==='audit'){
    return `<div class="card"><div class="table-wrap"><table><thead><tr><th>Timestamp</th><th>Actor</th><th>Action</th><th>Target</th></tr></thead><tbody>
      ${DB.auditLogs.slice(0,50).map(a=>`<tr><td class="muted">${a.ts}</td><td><div class="emp-cell">${empAvatar(a.actor)}<div class="nm">${empName(a.actor)}</div></div></td><td>${esc(a.action)}</td><td>${esc(a.target)}</td></tr>`).join('')}
    </tbody></table></div></div>`;
  }
  if(compTab==='reports'){
    const reports=[['Headcount by Department','👥'],['Attrition Report','📉'],['Leave Utilization','🌴'],['Attendance Summary','⏱️'],['Payroll Cost by Dept','💰'],['Open Positions','🎯']];
    return `<div class="grid-3">${reports.map(([r,ic])=>`<div class="card card-pad" style="display:flex;align-items:center;gap:12px">
      <div class="dot-ic" style="background:var(--brand-soft)">${ic}</div><div style="flex:1"><b>${r}</b></div>
      <button class="btn btn-sm" onclick="exportReport('${r}')">CSV</button></div>`).join('')}</div>`;
  }
}
function addPolicy(){
  const body=field('Policy Name','f-pn','')+field('Version','f-pv','1.0');
  openModal('Publish Policy',body,()=>{
    if(!val('f-pn')){toast('Name required','err');return false;}
    DB.policies.unshift({id:uid('po'),name:val('f-pn'),version:val('f-pv'),published:today(),acks:0});
    DB.notifications.push({id:uid('n'),to:'all',text:'New policy published — please acknowledge',ts:today(),read:false,icon:'📋'});
    log('Published policy',val('f-pn')+' v'+val('f-pv')); save(); navigate('compliance'); updateNotifBadge(); toast('Policy published','ok');
  },'Publish');
}
function exportReport(name){
  let rows=[];
  if(name.includes('Headcount')) rows=DB.departments.map(d=>({Department:d.name,Headcount:DB.employees.filter(e=>e.dept===d.id&&e.status!=='Terminated').length}));
  else rows=DB.employees.map(e=>({Name:e.name,Department:deptName(e.dept),Title:e.title,Status:e.status,StartDate:e.startDate}));
  const headers=Object.keys(rows[0]); const csv=[headers.join(',')].concat(rows.map(r=>headers.map(h=>`"${r[h]}"`).join(','))).join('\n');
  const blob=new Blob([csv],{type:'text/csv'}); const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=name.replace(/ /g,'_')+'.csv'; a.click(); URL.revokeObjectURL(url);
  toast('Report exported','ok');
}

function kpiRoles(){ return Object.keys(DB.kpiTemplates||{}); }
function kpiMax(role){ return (DB.kpiTemplates[role]||[]).reduce((s,c)=>s+c[1].reduce((a,i)=>a+i[1],0),0); }
function kpiTotals(sc){
  const tpl=DB.kpiTemplates[sc.role]||[]; let self=0,mgr=0,max=0;
  tpl.forEach((cat,ci)=>cat[1].forEach((it,ii)=>{ max+=it[1];
    const v=sc.scores[ci+'_'+ii]||{}; self+=(+v.s||0); mgr+=(+v.m||0); }));
  return {self,mgr,max,selfPct:Math.round(self/max*100),mgrPct:Math.round(mgr/max*100)};
}
function kpiCatTotals(sc,ci){
  const cat=(DB.kpiTemplates[sc.role]||[])[ci]; if(!cat) return {self:0,mgr:0,max:0}; let self=0,mgr=0,max=0;
  cat[1].forEach((it,ii)=>{ max+=it[1]; const v=sc.scores[ci+'_'+ii]||{}; self+=(+v.s||0); mgr+=(+v.m||0); });
  return {self,mgr,max};
}
function kpiGrade(pct){
  if(pct>=90) return ['🏆 Excellent','b-green'];
  if(pct>=70) return ['⭐ Good','b-blue'];
  if(pct>=50) return ['📈 Needs Improvement','b-amber'];
  return ['🔴 Underperforming','b-red'];
}
const KPI_LEGEND = `<div class="card card-pad" style="display:flex;gap:18px;flex-wrap:wrap;align-items:center;margin-bottom:18px">
  <b style="font-size:13px">Performance Bands (Handbook §14):</b>
  ${badge('🏆 Excellent 90–100','b-green')} ${badge('⭐ Good 70–89','b-blue')}
  ${badge('📈 Needs Improvement 50–69','b-amber')} ${badge('🔴 Underperforming < 50','b-red')}</div>`;

/* who can edit which column */
function kpiCanSelf(sc){ return isAdmin()||SESSION.empId===sc.emp; }
function kpiCanMgr(sc){ const e=DB.employees.find(x=>x.id===sc.emp); return isAdmin()||(isManager()&&e&&e.manager===SESSION.empId); }
function kpiVisible(){
  let rows=DB.kpiScorecards;
  if(isAdmin()) return rows;
  if(isManager()) return rows.filter(sc=>{const e=DB.employees.find(x=>x.id===sc.emp);return sc.emp===SESSION.empId||(e&&e.manager===SESSION.empId);});
  return rows.filter(sc=>sc.emp===SESSION.empId);
}

function renderKpiCards(){
  let rows=kpiVisible().slice().sort((a,b)=>b.month.localeCompare(a.month));
  if(kpiFilter.term){const t=kpiFilter.term.toLowerCase(); rows=rows.filter(sc=>empName(sc.emp).toLowerCase().includes(t));}
  if(kpiFilter.role) rows=rows.filter(sc=>sc.role===kpiFilter.role);
  if(kpiFilter.status) rows=rows.filter(sc=>sc.status===kpiFilter.status);
  if(kpiFilter.month) rows=rows.filter(sc=>sc.month===kpiFilter.month);
  if(kpiFilter.grade) rows=rows.filter(sc=>{const t=kpiTotals(sc);return kpiGrade(t.mgrPct||t.selfPct)[0].includes(kpiFilter.grade);});
  const cards = rows.map(sc=>{
    const t=kpiTotals(sc); const g=kpiGrade(t.mgrPct||t.selfPct);
    return `<div class="card card-pad" style="cursor:pointer" onclick="kpiOpen('${sc.id}')">
      <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:10px">

        <div><div class="muted" style="font-size:11px">MANAGER</div><b style="font-size:18px">${t.mgr}<span class="muted" style="font-size:12px">/${t.max}</span></b></div>
        <div style="flex:1;text-align:right;align-self:end">${badge(g[0],g[1])}</div></div>
      <div class="progress"><span style="width:${t.mgrPct||t.selfPct}%;background:${kpiGrade(t.mgrPct||t.selfPct)[1]==='b-red'?'var(--red)':'var(--brand)'}"></span></div>

  const c=$('#kpi-cards'); if(c) c.innerHTML=cards||'<div class="empty-state" style="grid-column:1/-1"><div class="ico">📋</div>No scorecards match your filters</div>';
