function kpiSet(id,key,which,value,max){
  const sc=DB.kpiScorecards.find(x=>x.id===id); if(!sc) return;
  let n=value===''?'':Math.max(0,Math.min(max,+value));
  if(!sc.scores[key]) sc.scores[key]={};
  sc.scores[key][which]=n;
  save();
  // live update totals
  const ci=+key.split('_')[0];
  const ct=kpiCatTotals(sc,ci); const t=kpiTotals(sc);
  const set=(el,v)=>{const e=$('#'+el); if(e) e.innerHTML=v;};
  set('kc-s-'+ci,ct.self); set('kc-m-'+ci,ct.mgr);
  set('kg-self',`${t.self}<span class="muted" style="font-size:16px">/${t.max}</span>`);
  set('kg-mgr',`${t.mgr}<span class="muted" style="font-size:16px">/${t.max}</span>`);
  const gS=kpiGrade(t.selfPct),gM=kpiGrade(t.mgrPct);
  set('kg-selfb',`${badge(gS[0],gS[1])} (${t.selfPct}%)`);
  set('kg-mgrb',`${badge(gM[0],gM[1])} (${t.mgrPct}%)`);
  set('kg-gap',Math.abs(t.self-t.mgr));
}
function kpiSetStatus(id){
  const sc=DB.kpiScorecards.find(x=>x.id===id);
  openModal('Update Status', field('Status','f-ks',sc.status,'select',['In Progress','Submitted','Acknowledged']), ()=>{
    sc.status=val('f-ks'); log('Updated KPI scorecard status',empName(sc.emp)+' '+sc.month); save(); navigate('kpi'); toast('Status updated','ok');
  });
}
function newScorecard(){
  const emps=DB.employees.filter(e=>e.status!=='Terminated');
  if(!emps.length){ toast('No employees found','err'); return; }
  const defRole=emps[0]?.kpiRole||kpiRoles()[0];
  const body=field('Employee','f-se',emps[0]?.id,'select',emps.map(e=>({v:e.id,t:e.name+(e.kpiRole?' — '+e.kpiRole:'')})))
    +field('KPI Template / Position','f-srole',defRole,'select',kpiRoles())
    +field('Month','f-sm',today().slice(0,7),'month');
  openModal('New KPI Scorecard',body,()=>{
    const e=DB.employees.find(x=>x.id===val('f-se')); if(!e){toast('Pick an employee','err');return false;}
    const role=val('f-srole')||e.kpiRole; if(!role||!DB.kpiTemplates[role]){toast('Pick a KPI template','err');return false;}
    const month=val('f-sm')||today().slice(0,7);
    if(DB.kpiScorecards.find(s=>s.emp===e.id&&s.month===month&&s.role===role)){toast('Scorecard already exists for that month','err');return false;}
    const sc={id:uid('kpi'),emp:e.id,role,month,status:'In Progress',scores:{}};
    DB.kpiScorecards.push(sc); log('Created KPI scorecard',e.name+' '+month); save();
    DB.notifications.push({id:uid('n'),to:e.id,text:'A new KPI scorecard was created for you',ts:today(),read:false,icon:'📋'});
    updateNotifBadge(); kpiOpen(sc.id); toast('Scorecard created','ok');
  },'Create');
}
AFTER.kpi = () => { renderKpiCards(); };

/* =========================================================================
   REIMBURSEMENTS  — employees apply, managers approve, HR/Admin clears amount
   ========================================================================= */
const REIMB_CATS=['Travel','Food','Software','Equipment','Internet','Training','Other'];
function reimbVisible(){
  if(isAdmin()) return DB.reimbursements;
  if(isManager()) return DB.reimbursements.filter(r=>{const e=DB.employees.find(x=>x.id===r.emp);return r.emp===SESSION.empId||(e&&e.manager===SESSION.empId);});
  return DB.reimbursements.filter(r=>r.emp===SESSION.empId);
}
let reimbFilter='';
VIEWS.reimbursements = () => {
  const rows=reimbVisible();
  const pending=rows.filter(r=>r.status==='Pending').length;
  const approved=rows.filter(r=>r.status==='Approved');
  const toClear=approved.reduce((s,r)=>s+r.amount,0);
  const clearedAmt=rows.filter(r=>r.status==='Cleared').reduce((s,r)=>s+r.amount,0);
  return `<div class="section-head"><div><h2>Reimbursements</h2><div class="desc">Apply for expense claims · managers approve · HR clears payment</div></div>
    <button class="btn btn-primary" onclick="applyReimbursement()">+ New Claim</button></div>
    <div class="kpis">
      ${kpi('Pending Approval',pending,'Awaiting manager/HR','⏳','var(--amber-soft)')}
      ${kpi('Approved — To Clear',fmtMoney(toClear),approved.length+' claims','💳','var(--blue-soft)')}
      ${kpi('Cleared (Paid)',fmtMoney(clearedAmt),'Reimbursed','✅','var(--green-soft)')}
      ${kpi('Total Claims',rows.length,'All time','🧾','var(--brand-soft)')}
    </div>
    <div class="toolbar">
      <select onchange="reimbFilter=this.value;renderReimbTable()"><option value="">All Status</option>${['Pending','Approved','Cleared','Rejected'].map(s=>`<option${reimbFilter===s?' selected':''}>${s}</option>`).join('')}</select>
    </div>
    <div class="card"><div class="table-wrap" id="reimb-table"></div></div>`;
};
AFTER.reimbursements = renderReimbTable;
function renderReimbTable(){
  let rows=reimbVisible().slice().sort((a,b)=>b.appliedOn.localeCompare(a.appliedOn));
  if(reimbFilter) rows=rows.filter(r=>r.status===reimbFilter);
  const html=`<table><thead><tr><th>Employee</th><th>Category</th><th>Description</th><th>Expense Date</th><th>Amount</th><th>Status</th><th>Action</th></tr></thead><tbody>
    ${rows.map(r=>{
      const canApprove=(isAdmin()||(isManager()&&DB.employees.find(e=>e.id===r.emp)?.manager===SESSION.empId))&&r.status==='Pending';
      const canClear=isAdmin()&&r.status==='Approved';
      return `<tr><td><div class="emp-cell">${empAvatar(r.emp)}<div class="nm">${empName(r.emp)}</div></div></td>
        <td>${badge(r.category,'b-blue')}</td><td>${esc(r.description)}</td><td>${fmtDate(r.date)}</td>
        <td><b>${fmtMoney(r.amount)}</b></td><td>${sbadge(r.status)}</td>
        <td style="white-space:nowrap">${canApprove?`<button class="btn btn-sm btn-primary" onclick="decideReimb('${r.id}','Approved')">Approve</button> <button class="btn btn-sm btn-danger" onclick="decideReimb('${r.id}','Rejected')">Reject</button>`:''}
          ${canClear?`<button class="btn btn-sm btn-primary" onclick="clearReimb('${r.id}')">💳 Clear Payment</button>`:''}
          ${(r.status==='Cleared')?`<span class="muted" style="font-size:12px">Paid ${fmtDate(r.clearedOn)}</span>`:''}
          ${(r.status==='Rejected')?'<span class="muted">—</span>':''}
          ${(r.status==='Approved'&&!canClear)?'<span class="muted" style="font-size:12px">Awaiting HR clearance</span>':''}</td></tr>`;
    }).join('')||'<tr><td colspan="7"><div class="empty-state"><div class="ico">🧾</div>No reimbursement claims</div></td></tr>'}
  </tbody></table>`;
  const c=$('#reimb-table'); if(c) c.innerHTML=html;
}
function applyReimbursement(){
  const body=`<div class="form-row two">
      <div class="form-row" style="margin:0"><label>Category</label><select id="f-rc" onchange="document.getElementById('f-rc-other-row').style.display=this.value==='Other'?'block':'none'">${REIMB_CATS.map(c=>`<option${c==='Travel'?' selected':''}>${esc(c)}</option>`).join('')}</select></div>
      ${field('Amount','f-ra','','number')}</div>
    <div class="form-row" id="f-rc-other-row" style="display:none"><label>Specify category</label><input type="text" id="f-rc-other" placeholder="e.g. Conference fee, Domain renewal…"></div>
    ${field('Expense Date','f-rd',today(),'date')}
    ${field('Description','f-rdesc','','textarea')}
    <div class="form-row"><label>Receipt (optional)</label><input type="file" id="f-rfile"></div>`;
  openModal('New Reimbursement Claim',body,()=>{
    const amt=+val('f-ra');
    if(!amt||amt<=0){toast('Enter a valid amount','err');return false;}
    if(!val('f-rdesc')){toast('Add a description','err');return false;}
    let category=val('f-rc');
    if(category==='Other'){ const custom=val('f-rc-other').trim(); if(!custom){toast('Please specify the category','err');return false;} category=custom; }
    const fileEl=$('#f-rfile'); const receipt=fileEl&&fileEl.files&&fileEl.files[0]?fileEl.files[0].name:'';
    const r={id:uid('rb'),emp:SESSION.empId,category,amount:amt,date:val('f-rd'),description:val('f-rdesc'),receipt,status:'Pending',appliedOn:today()};
    DB.reimbursements.push(r);
    const mgr=DB.employees.find(e=>e.id===SESSION.empId)?.manager||'e3';
    DB.notifications.push({id:uid('n'),to:mgr,text:`${SESSION.name} submitted a ${fmtMoney(amt)} reimbursement claim`,ts:today(),read:false,icon:'🧾'});
    log('Submitted reimbursement',val('f-rc')+' '+fmtMoney(amt)); save(); navigate('reimbursements'); updateNotifBadge(); toast('Claim submitted','ok');
  },'Submit Claim');
}
function decideReimb(id,decision){
  const r=DB.reimbursements.find(x=>x.id===id); r.status=decision; r.approver=SESSION.empId;
  DB.notifications.push({id:uid('n'),to:r.emp,text:`Your ${fmtMoney(r.amount)} reimbursement was ${decision.toLowerCase()}`,ts:today(),read:false,icon:decision==='Approved'?'💳':'❌'});
  log(decision+' reimbursement',empName(r.emp)+' '+fmtMoney(r.amount)); save(); renderReimbTable(); updateNotifBadge();
  toast('Claim '+decision.toLowerCase(),'ok');
}
function clearReimb(id){
  const r=DB.reimbursements.find(x=>x.id===id);
  const body=`<p>Clear payment of <b>${fmtMoney(r.amount)}</b> to <b>${empName(r.emp)}</b> for <i>${esc(r.description)}</i>?</p>
    <div class="form-row" style="margin-top:14px">${field('Payment Reference / Note','f-cn','Bank transfer · '+today())}</div>`;
  openModal('Clear Reimbursement',body,()=>{
    r.status='Cleared'; r.clearedOn=today(); r.clearedBy=SESSION.empId; r.payRef=val('f-cn');
    DB.notifications.push({id:uid('n'),to:r.emp,text:`Your reimbursement of ${fmtMoney(r.amount)} has been cleared & paid`,ts:today(),read:false,icon:'✅'});
    log('Cleared reimbursement',empName(r.emp)+' '+fmtMoney(r.amount)); save(); renderReimbTable(); updateNotifBadge(); toast('Payment cleared','ok');
  },'Confirm Payment');
}

const DOC_TYPES_DEFAULT=['Offer Letter','Appointment Letter','Relieving Letter','ID Proof','PAN Card','Aadhaar Card','Contract/NDA','Bank Details','Certification','Payslip','Other'];
function docTypes(){ return DB.docTypes||DOC_TYPES_DEFAULT; }
let docFilter={term:'',emp:'',type:''};
function docVisible(){
  if(isAdmin()) return DB.documents;
  if(isManager()) return DB.documents.filter(d=>{const e=DB.employees.find(x=>x.id===d.emp);return d.emp===SESSION.empId||(e&&e.manager===SESSION.empId);});
  return DB.documents.filter(d=>d.emp===SESSION.empId);
}
VIEWS.documents = () => {
  return `<div class="section-head"><div><h2>Document Vault</h2><div class="desc">Central store for employee documents</div></div>
    <button class="btn btn-primary" onclick="uploadDocument()">+ Upload Document</button></div>
    <div class="toolbar">
      <input type="text" placeholder="Search document name or type…" value="${esc(docFilter.term)}" oninput="docFilter.term=this.value;renderDocTable()">
      ${isAdmin()?`<select onchange="docFilter.emp=this.value;renderDocTable()"><option value="">All Employees</option>${DB.employees.map(e=>`<option value="${e.id}"${docFilter.emp===e.id?' selected':''}>${esc(e.name)}</option>`).join('')}</select>`:''}
      <select onchange="docFilter.type=this.value;renderDocTable()"><option value="">All Types</option>${docTypes().map(t=>`<option${docFilter.type===t?' selected':''}>${t}</option>`).join('')}</select>
      <div class="spacer"></div><button class="btn btn-sm" onclick="docFilter={term:'',emp:'',type:''};navigate('documents')">Clear</button>
    </div>
    <div class="card"><div class="table-wrap" id="doc-table"></div></div>`;
};
AFTER.documents = renderDocTable;
function renderDocTable(){
  let rows=docVisible().slice().sort((a,b)=>(b.uploadedOn||'').localeCompare(a.uploadedOn||''));
  if(docFilter.emp) rows=rows.filter(d=>d.emp===docFilter.emp);
  if(docFilter.type) rows=rows.filter(d=>d.type===docFilter.type);
  if(docFilter.term){const t=docFilter.term.toLowerCase(); rows=rows.filter(d=>(d.name||'').toLowerCase().includes(t)||(d.type||'').toLowerCase().includes(t)||empName(d.emp).toLowerCase().includes(t));}
  const html=`<table><thead><tr><th>Employee</th><th>Type</th><th>Document</th><th>Uploaded</th><th>By</th><th>Actions</th></tr></thead><tbody>
    ${rows.map(d=>{const canEdit=isAdmin()||d.emp===SESSION.empId;
      return `<tr><td><div class="emp-cell">${empAvatar(d.emp)}<div class="nm">${empName(d.emp)}</div></div></td>
      <td>${badge(d.type,'b-blue')}</td><td>📄 ${esc(d.name)}</td><td>${fmtDate(d.uploadedOn)}</td><td>${empName(d.uploadedBy)}</td>
      <td style="white-space:nowrap"><button class="btn btn-sm" onclick="viewDoc('${d.id}')">View</button>${canEdit?` <button class="btn btn-sm" onclick="editDocument('${d.id}')">Edit</button> <button class="btn btn-sm btn-danger" onclick="deleteDoc('${d.id}')">Delete</button>`:''}</td></tr>`;}).join('')
      ||'<tr><td colspan="6"><div class="empty-state"><div class="ico">📁</div>No documents match your filters</div></td></tr>'}
  </tbody></table>`;
  const t=$('#doc-table'); if(t) t.innerHTML=html;
}
function editDocument(id){
  const d=DB.documents.find(x=>x.id===id);
  const emps=isAdmin()?DB.employees:DB.employees.filter(e=>e.id===SESSION.empId);
  const hasLink=d.fileUrl&&!String(d.fileUrl).startsWith('data:');
  const body=`<div class="form-row two">${field('Employee','f-de',d.emp,'select',emps.map(e=>({v:e.id,t:e.name})))}${field('Document Type','f-dt',d.type,'select',docTypes())}</div>
    ${field('Document Name','f-dname',d.name||'')}
    <div class="form-row"><label>Link ${hasLink?'':'(none set)'}</label><input type="text" id="f-dlink" value="${esc(hasLink?d.fileUrl:'')}" placeholder="https://…"></div>
    <div class="form-row"><label>…or replace with file upload</label><input type="file" id="f-dfile"></div>`;
  openModal('Edit Document',body,()=>{
    d.emp=val('f-de'); d.type=val('f-dt'); if(val('f-dname')) d.name=val('f-dname');
    readFileAsDataURL($('#f-dfile'),f=>{
      if(f){ d.fileUrl=f.url; d.name=f.name; }
      else { const link=val('f-dlink'); if(link) d.fileUrl=asUrl(link); }
      log('Edited document',d.type+' · '+empName(d.emp)); save(); closeModal(); renderDocTable(); toast('Document updated','ok');
    });
    return false;
  });
}
function uploadDocument(){
  const emps=isAdmin()?DB.employees:DB.employees.filter(e=>e.id===SESSION.empId);
  const body=`<div class="form-row two">${field('Employee','f-de',SESSION.empId,'select',emps.map(e=>({v:e.id,t:e.name})))}${field('Document Type','f-dt',docTypes()[0],'select',docTypes())}</div>
    <div class="form-row"><label>Paste link (Drive / URL)</label><input type="text" id="f-dlink" placeholder="https://drive.google.com/…"></div>
    <div class="form-row"><label>…or upload file</label><input type="file" id="f-dfile"></div>`;
  openModal('Upload Document',body,()=>{
    const doc={id:uid('doc'),emp:val('f-de'),type:val('f-dt'),uploadedOn:today(),uploadedBy:SESSION.empId,fileUrl:'',name:''};
    readFileAsDataURL($('#f-dfile'),f=>{
      if(f){ doc.fileUrl=f.url; doc.name=f.name; }
      else { doc.fileUrl=asUrl(val('f-dlink')); doc.name=val('f-dlink')?val('f-dlink').split('/').pop()||'document':'document.pdf'; }
      DB.documents.push(doc); log('Uploaded document',doc.type+' · '+empName(doc.emp)); save(); closeModal(); renderDocTable(); toast('Document uploaded','ok');
    });
    return false;
  },'Upload');
}
function viewDoc(id){ const d=DB.documents.find(x=>x.id===id); const u=asUrl(d.fileUrl)||(d.fileUrl&&d.fileUrl.startsWith('data:')?d.fileUrl:''); if(u){ window.open(u,'_blank'); } else { toast('No file attached (demo placeholder)','err'); } }
function deleteDoc(id){ const d=DB.documents.find(x=>x.id===id); if(!confirm('Delete '+d.type+' for '+empName(d.emp)+'?'))return; DB.documents=DB.documents.filter(x=>x.id!==id); log('Deleted document',d.type+' · '+empName(d.emp)); save(); renderDocTable(); toast('Deleted','ok'); }

  return DB.investmentProofs.filter(p=>p.emp===SESSION.empId);
}
let invFilter='';
VIEWS.investments = () => {
  const rows=invVisible();
  const approvedAmt=rows.filter(p=>p.status==='Approved').reduce((s,p)=>s+(p.declared||0),0);
  const pending=rows.filter(p=>p.status==='Pending').length;
  const totalDeclared=rows.reduce((s,p)=>s+(p.declared||0),0);
  return `<div class="section-head"><div><h2>Tax & Investment Declarations</h2><div class="desc">Submit tax-saving proofs · HR verifies for TDS · FY 2025-26</div></div>
    <button class="btn btn-primary" onclick="submitProof()">+ Submit Declaration</button></div>

      ${kpi('Approved',fmtMoney(approvedAmt),'Verified for TDS','✅','var(--green-soft)')}

    <div class="toolbar"><select onchange="invFilter=this.value;renderInvTable()"><option value="">All Status</option>${['Pending','Approved','Rejected'].map(s=>`<option${invFilter===s?' selected':''}>${s}</option>`).join('')}</select></div>

AFTER.investments = renderInvTable;
function renderInvTable(){
  let rows=invVisible().slice().sort((a,b)=>(b.submittedOn||'').localeCompare(a.submittedOn||''));
  if(invFilter) rows=rows.filter(p=>p.status===invFilter);
  const html=`<table><thead><tr><th>Employee</th><th>Section</th><th>Investment</th><th>Declared</th><th>Proof</th><th>Submitted</th><th>Status</th><th></th></tr></thead><tbody>
    ${rows.map(p=>{const canReview=isAdmin()&&p.status==='Pending';

      <td>${badge(p.section,'b-purple')}</td><td>${esc(p.item)}</td><td><b>${fmtMoney(p.declared)}</b></td>
      <td>${p.proof?'📎 '+esc(p.proof):'<span class="muted">—</span>'}</td><td>${fmtDate(p.submittedOn)}</td><td>${sbadge(p.status)}</td>
      <td style="white-space:nowrap">${canReview?`<button class="btn btn-sm btn-primary" onclick="decideProof('${p.id}','Approved')">Approve</button> <button class="btn btn-sm btn-danger" onclick="decideProof('${p.id}','Rejected')">Reject</button>`:p.status==='Approved'?'✓':''}</td></tr>`;}).join('')

  </tbody></table>`;

function submitProof(){
  const body=`<div class="form-row two">${field('Section','f-is',TAX_SECTIONS[0],'select',TAX_SECTIONS)}${field('Declared Amount','f-ia','','number')}</div>
    ${field('Investment / Item','f-ii','','text')}
    <div class="form-row"><label>Proof — paste link</label><input type="text" id="f-iplink" placeholder="https://… statement / receipt"></div>
    <div class="form-row"><label>…or upload proof</label><input type="file" id="f-ipfile"></div>`;
  openModal('Submit Tax Declaration',body,()=>{
    const amt=+val('f-ia'); if(!amt){toast('Enter amount','err');return false;}
    if(!val('f-ii')){toast('Enter investment item','err');return false;}
    const p={id:uid('ip'),emp:SESSION.empId,fy:'2025-26',section:val('f-is'),item:val('f-ii'),declared:amt,proof:'',status:'Pending',submittedOn:today(),reviewer:''};
    readFileAsDataURL($('#f-ipfile'),f=>{
      p.proof=f?f.name:(val('f-iplink')?val('f-iplink').split('/').pop():'');
      p.proofUrl=f?f.url:asUrl(val('f-iplink'));
      DB.investmentProofs.push(p);
      DB.notifications.push({id:uid('n'),to:'e3',text:`${SESSION.name} submitted a ${p.section} declaration (${fmtMoney(amt)})`,ts:today(),read:false,icon:'📑'});
      log('Submitted tax declaration',p.section+' '+fmtMoney(amt)); save(); closeModal(); renderInvTable(); updateNotifBadge(); toast('Declaration submitted','ok');
    });
    return false;
  },'Submit');
}
function decideProof(id,status){
  const p=DB.investmentProofs.find(x=>x.id===id); p.status=status; p.reviewer=SESSION.empId;
  DB.notifications.push({id:uid('n'),to:p.emp,text:`Your ${p.section} declaration was ${status.toLowerCase()}`,ts:today(),read:false,icon:status==='Approved'?'✅':'❌'});
  log(status+' tax declaration',empName(p.emp)+' '+p.section); save(); renderInvTable(); updateNotifBadge(); toast('Declaration '+status.toLowerCase(),'ok');
}

/* =========================================================================
   SALES INCENTIVE CALCULATOR  (per Crawl Digitally Sales Policy §6)
   ========================================================================= */
function overTargetIncentive(excess){
  if(excess<=0) return {rate:0,amount:0};
  let rate; if(excess<=50000) rate=2.5; else if(excess<=150000) rate=5; else if(excess<=300000) rate=7.5; else rate=10;
  return {rate, amount:Math.round(excess*rate/100)};
}
function computeIncentive(inp){
  const target=+inp.target||0, revenue=+inp.revenue||0, baseRate=+inp.rate||0, newRev=+inp.newRev||0;
  const reqNew=Math.round(target*0.25);
  const shortfall=Math.max(0,reqNew-newRev);
  const shortfallPenalty=Math.round(shortfall*0.5);                 // §6.3 shortfall counted at 50% face value
  const halfCount=Math.round(0.5*((+inp.retainer2nd||0)+(+inp.upsellSame||0))); // §6.4/§6.5 counted 50% toward target
  const effRevenue=Math.max(0,revenue-halfCount-shortfallPenalty);  // effective revenue for target
  const excess=Math.max(0,effRevenue-target);
  const targetMet=effRevenue>=target;
  const base=Math.round(revenue*baseRate/100);                      // §6.1 base commission on revenue received
  const htBonus=Math.round((+inp.ht1||0)*0.02+(+inp.ht2||0)*0.05);  // §6.2 high-ticket: ₹1L+ +2%, ₹2L+ +5%
  const testimonial=(+inp.testimonials||0)*1000;                    // testimonial incentive ₹1,000/client
  const retainerOngoing=targetMet?Math.round((+inp.retainer3plus||0)*0.01):0; // §6.4 1% from 3rd month if target met
  const over=overTargetIncentive(excess);                           // §6.2 over-target slabs
  const retention=(inp.retention==='3'?1500:0)+(inp.retention==='6'?2500:0);   // retention bonus
  const badDebt=+inp.badDebt||0;                                    // §6.6 recovery
  const total=base+htBonus+testimonial+retainerOngoing+over.amount+retention-badDebt;
  return {reqNew,shortfall,shortfallPenalty,halfCount,effRevenue,excess,targetMet,base,htBonus,testimonial,retainerOngoing,over,retention,badDebt,total,
    newClientPct:target?Math.round(newRev/target*100):0,achievement:target?Math.round(effRevenue/target*100):0};
}

}
function viewIncentive(id){ const r=DB.salesIncentives.find(x=>x.id===id); openModal('Incentive — '+empName(r.emp)+' · '+new Date(r.month+'-01').toLocaleDateString('en-US',{month:'long',year:'numeric'}), incentiveBreakdownHTML(computeIncentive(r),r), null); }
function editIncentive(id){ siEditId=id; siTab='calc'; navigate('salesincentive'); }
function markIncentivePaid(id){ const r=DB.salesIncentives.find(x=>x.id===id); r.status='Paid'; r.paidOn=today();
  DB.notifications.push({id:uid('n'),to:r.emp,text:'Your sales incentive of '+fmtMoney(computeIncentive(r).total)+' for '+new Date(r.month+'-01').toLocaleDateString('en-US',{month:'short',year:'numeric'})+' has been paid',ts:today(),read:false,icon:'💸'});
  log('Paid sales incentive',empName(r.emp)+' '+r.month); save(); updateNotifBadge(); navigate('salesincentive'); toast('Marked paid','ok'); }
function deleteIncentive(id){ const r=DB.salesIncentives.find(x=>x.id===id); if(!confirm('Delete incentive record for '+empName(r.emp)+'?'))return; DB.salesIncentives=DB.salesIncentives.filter(x=>x.id!==id); save(); navigate('salesincentive'); toast('Deleted','ok'); }

/* =========================================================================
   ASSET REGISTER  (Handbook §23 — company assets assigned to employees)
   ========================================================================= */
const ASSET_TYPES=['Laptop','Desktop','Monitor','Phone','Camera','Mic','Lighting','Hard Drive','Software License','Accessory','Other'];
const ASSET_STATUS=['Available','Assigned','Under Repair','Lost','Returned','Retired'];
let assetFilter={term:'',type:'',status:''};
VIEWS.assets = () => {
  const all=DB.assets;
  const assigned=all.filter(a=>a.status==='Assigned').length;
  const available=all.filter(a=>a.status==='Available').length;
  return `<div class="section-head"><div><h2>Asset Register</h2><div class="desc">Company devices & equipment assigned to employees (Handbook §23)</div></div>
    <button class="btn btn-primary" onclick="addAsset()">+ Add Asset</button></div>
    <div class="kpis">
      ${kpi('Total Assets',all.length,'In register','💻','var(--brand-soft)')}
      ${kpi('Assigned',assigned,'In use','✅','var(--green-soft)')}
      ${kpi('Available',available,'Unallocated','📦','var(--blue-soft)')}
      ${kpi('Issues',all.filter(a=>a.status==='Under Repair'||a.status==='Lost').length,'Repair / lost','⚠️','var(--amber-soft)')}
    </div>
    <div class="toolbar">
      <input type="text" placeholder="Search name, serial, holder…" value="${esc(assetFilter.term)}" oninput="assetFilter.term=this.value;renderAssetTable()">
      <select onchange="assetFilter.type=this.value;renderAssetTable()"><option value="">All Types</option>${ASSET_TYPES.map(t=>`<option${assetFilter.type===t?' selected':''}>${t}</option>`).join('')}</select>
      <select onchange="assetFilter.status=this.value;renderAssetTable()"><option value="">All Status</option>${ASSET_STATUS.map(s=>`<option${assetFilter.status===s?' selected':''}>${s}</option>`).join('')}</select>
      <div class="spacer"></div><button class="btn btn-sm" onclick="assetFilter={term:'',type:'',status:''};navigate('assets')">Clear</button>
    </div>
    <div class="card"><div class="table-wrap" id="asset-table"></div></div>`;
};
AFTER.assets = renderAssetTable;
function renderAssetTable(){
  let rows=DB.assets.slice();
  if(assetFilter.type) rows=rows.filter(a=>a.type===assetFilter.type);
  if(assetFilter.status) rows=rows.filter(a=>a.status===assetFilter.status);
  if(assetFilter.term){const t=assetFilter.term.toLowerCase(); rows=rows.filter(a=>(a.name||'').toLowerCase().includes(t)||(a.serial||'').toLowerCase().includes(t)||(a.assignedTo?empName(a.assignedTo).toLowerCase().includes(t):false));}
  const stCls=s=>s==='Assigned'?'b-green':s==='Available'?'b-blue':s==='Lost'?'b-red':s==='Under Repair'?'b-amber':'b-gray';
  const html=`<table><thead><tr><th>Asset</th><th>Type</th><th>Serial / ID</th><th>Assigned To</th><th>Since</th><th>Status</th><th>Actions</th></tr></thead><tbody>
    ${rows.map(a=>`<tr><td><b>${esc(a.name)}</b>${a.notes?`<div class="muted" style="font-size:11px">${esc(a.notes)}</div>`:''}</td>
      <td>${badge(a.type,'b-gray')}</td><td class="muted">${esc(a.serial||'—')}</td>
      <td>${a.assignedTo?`<div class="emp-cell">${empAvatar(a.assignedTo)}<div class="nm">${empName(a.assignedTo)}</div></div>`:'<span class="muted">—</span>'}</td>
      <td>${a.assignedOn?fmtDate(a.assignedOn):'—'}</td><td>${badge(a.status,stCls(a.status))}</td>
      <td style="white-space:nowrap">${a.status==='Assigned'?`<button class="btn btn-sm" onclick="returnAsset('${a.id}')">Return</button>`:`<button class="btn btn-sm btn-primary" onclick="assignAsset('${a.id}')">Assign</button>`} <button class="btn btn-sm" onclick="editAsset('${a.id}')">Edit</button> <button class="btn btn-sm btn-danger" onclick="deleteAsset('${a.id}')">✕</button></td></tr>`).join('')
      ||'<tr><td colspan="7"><div class="empty-state"><div class="ico">💻</div>No assets match your filters</div></td></tr>'}
  </tbody></table>`;
  const t=$('#asset-table'); if(t) t.innerHTML=html;
}
function assetForm(a={}){
  return `<div class="form-row two">${field('Asset Name','f-an',a.name||'')}${field('Type','f-at',a.type||ASSET_TYPES[0],'select',ASSET_TYPES)}</div>
    <div class="form-row two">${field('Serial / ID','f-as',a.serial||'')}${field('Status','f-ast',a.status||'Available','select',ASSET_STATUS)}</div>
    <div class="form-row two">${field('Assigned To','f-ae',a.assignedTo||'','select',[{v:'',t:'— Unassigned —'}].concat(DB.employees.map(e=>({v:e.id,t:e.name}))))}${field('Assigned On','f-ad',a.assignedOn||'','date')}</div>
    ${field('Notes','f-anote',a.notes||'','textarea')}`;
}
function addAsset(){ openModal('Add Asset',assetForm(),()=>{
  if(!val('f-an')){toast('Asset name required','err');return false;}
  const assignedTo=val('f-ae'); const status=assignedTo?(val('f-ast')==='Available'?'Assigned':val('f-ast')):val('f-ast');
  DB.assets.push({id:uid('as'),name:val('f-an'),type:val('f-at'),serial:val('f-as'),status,assignedTo,assignedOn:assignedTo?(val('f-ad')||today()):'',notes:val('f-anote')});
  log('Added asset',val('f-an')); save(); renderAssetTable(); toast('Asset added','ok');
},'Add Asset'); }
function editAsset(id){ const a=DB.assets.find(x=>x.id===id); openModal('Edit Asset',assetForm(a),()=>{
  a.name=val('f-an');a.type=val('f-at');a.serial=val('f-as');a.status=val('f-ast');a.assignedTo=val('f-ae');a.assignedOn=a.assignedTo?(val('f-ad')||a.assignedOn||today()):'';a.notes=val('f-anote');
  log('Edited asset',a.name); save(); renderAssetTable(); toast('Asset updated','ok');
}); }
function assignAsset(id){ const a=DB.assets.find(x=>x.id===id);
  openModal('Assign "'+a.name+'"', field('Assign To','f-ae',DB.employees[0].id,'select',DB.employees.filter(e=>e.status!=='Terminated').map(e=>({v:e.id,t:e.name})))+field('Assigned On','f-ad',today(),'date'), ()=>{
    a.assignedTo=val('f-ae'); a.assignedOn=val('f-ad')||today(); a.status='Assigned';
    DB.notifications.push({id:uid('n'),to:a.assignedTo,text:'Asset assigned to you: '+a.name,ts:today(),read:false,icon:'💻'});
    log('Assigned asset',a.name+' → '+empName(a.assignedTo)); save(); renderAssetTable(); updateNotifBadge(); toast('Asset assigned','ok');
  },'Assign'); }
function returnAsset(id){ const a=DB.assets.find(x=>x.id===id); if(!confirm('Mark "'+a.name+'" returned by '+empName(a.assignedTo)+'?'))return;
  log('Asset returned',a.name+' from '+empName(a.assignedTo)); a.assignedTo=''; a.assignedOn=''; a.status='Available'; save(); renderAssetTable(); toast('Asset returned','ok'); }
function deleteAsset(id){ const a=DB.assets.find(x=>x.id===id); if(!confirm('Delete asset "'+a.name+'"?'))return; DB.assets=DB.assets.filter(x=>x.id!==id); save(); renderAssetTable(); toast('Deleted','ok'); }

/* =========================================================================
   BOOT
   ========================================================================= */
loadDB();
initLogin();
</script>
</body>
</html>
